              // ── Clipboard popup — preview uses visibility toggle (no hierarchy changes during touch) ──
              private fun showClipboardPopup(anchor: View) {
                  clipboardPopup?.dismiss()
                  val popupWidth = (resources.displayMetrics.widthPixels * 0.8).toInt()
                  val POPUP_HEIGHT = 280.dp
                  val TAB_HEIGHT   = 40.dp
                  val CONTENT_HEIGHT = POPUP_HEIGHT - TAB_HEIGHT

                  // Preview text lives in the hierarchy always — we just show/hide it.
                  // This avoids any addView/removeView during an active touch sequence.
                  val previewTextView = TextView(this).apply {
                      textSize = 16f; setTextColor(0xFFCCCCCC.toInt())
                      setPadding(14.dp, 14.dp, 14.dp, 14.dp)
                      maxLines = 10
                      ellipsize = android.text.TextUtils.TruncateAt.END
                  }
                  val previewContainer = ScrollView(this).apply {
                      visibility = View.INVISIBLE
                      setBackgroundColor(0xFF2C2C2C.toInt())   // same fill as popup
                      layoutParams = FrameLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT)
                      addView(previewTextView)
                  }

                  // List container — also always in hierarchy
                  val listContainer = FrameLayout(this).apply {
                      layoutParams = FrameLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT)
                  }

                  // FrameLayout stacks list + preview; visibility determines which is visible
                  val contentFrame = FrameLayout(this).apply {
                      layoutParams = LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, CONTENT_HEIGHT)
                  }
                  contentFrame.addView(listContainer)
                  contentFrame.addView(previewContainer)

                  // Safe preview callbacks — only visibility changes, zero hierarchy modification
                  val onPreviewStart: (String) -> Unit = { text ->
                      previewTextView.text = text
                      listContainer.visibility = View.INVISIBLE
                      previewContainer.visibility = View.VISIBLE
                  }
                  val onPreviewEnd: () -> Unit = {
                      listContainer.visibility = View.VISIBLE
                      previewContainer.visibility = View.INVISIBLE
                  }

                  var recentTabView: TextView? = null
                  var savedTabView: TextView? = null
                  var switchTabFn: ((String) -> Unit)? = null

                  fun buildList(items: MutableList<String>, isRecent: Boolean): View {
                      if (items.isEmpty()) {
                          return TextView(this).apply {
                              text = if (isRecent) "No recent items" else "No saved items"
                              textSize = 16f; setTextColor(0xFF555555.toInt()); gravity = Gravity.CENTER
                              layoutParams = ViewGroup.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT)
                          }
                      }
                      val adapter = ClipboardAdapter(
                          items = items, showSaveBtn = isRecent,
                          onPaste = { item -> commitText(item); clipboardPopup?.dismiss() },
                          onSave = { item ->
                              if (!savedItems.contains(item)) {
                                  savedItems.add(0, item)
                                  if (savedItems.size > MAX_SAVED) savedItems.removeAt(savedItems.size - 1)
                                  saveSavedItems()
                              }
                          },
                          onDeleteRequest = { pos, view ->
                              showDeleteConfirm(view) {
                                  if (pos < items.size) {
                                      items.removeAt(pos)
                                      if (isRecent) { clipAdapter?.notifyItemRemoved(pos); saveClipboard() }
                                      else { savedAdapter?.notifyItemRemoved(pos); saveSavedItems() }
                                      if (items.isEmpty()) switchTabFn?.invoke(if (isRecent) "recent" else "saved")
                                  }
                              }
                          },
                          onPreviewStart = onPreviewStart,
                          onPreviewEnd = onPreviewEnd
                      )
                      if (isRecent) clipAdapter = adapter else savedAdapter = adapter
                      return RecyclerView(this).apply {
                          layoutManager = LinearLayoutManager(this@Keyboard); this.adapter = adapter
                          layoutParams = ViewGroup.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT)
                      }
                  }

                  fun switchTab(tab: String) {
                      activeClipTab = tab
                      // Reset preview whenever tab switches
                      previewContainer.visibility = View.INVISIBLE
                      listContainer.visibility = View.VISIBLE
                      // Swap list content
                      listContainer.removeAllViews()
                      listContainer.addView(buildList(if (tab == "recent") clipboardItems else savedItems, tab == "recent"))
                      recentTabView?.apply {
                          setBackgroundColor(if (tab == "recent") 0xFF2C2C2C.toInt() else 0xFF1A1A1A.toInt())
                          setTextColor(if (tab == "recent") 0xFF4FC3F7.toInt() else 0xFF555555.toInt())
                      }
                      savedTabView?.apply {
                          setBackgroundColor(if (tab == "saved") 0xFF2C2C2C.toInt() else 0xFF1A1A1A.toInt())
                          setTextColor(if (tab == "saved") 0xFF4FC3F7.toInt() else 0xFF555555.toInt())
                      }
                  }
                  switchTabFn = ::switchTab

                  val tabRow = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL; setBackgroundColor(0xFF1A1A1A.toInt())
                      layoutParams = LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, TAB_HEIGHT)
                  }
                  recentTabView = TextView(this).apply {
                      text = "Recent"; textSize = 13f; gravity = Gravity.CENTER
                      layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.MATCH_PARENT, 1f)
                      setOnClickListener { switchTab("recent") }
                  }
                  savedTabView = TextView(this).apply {
                      text = "Saved"; textSize = 13f; gravity = Gravity.CENTER
                      layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.MATCH_PARENT, 1f)
                      setOnClickListener { switchTab("saved") }
                  }
                  tabRow.addView(recentTabView); tabRow.addView(savedTabView)

                  val contentBox = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL; setBackgroundResource(R.drawable.popup_border)
                      layoutParams = LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, CONTENT_HEIGHT)
                  }
                  contentBox.addView(contentFrame)

                  val outer = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      layoutParams = ViewGroup.LayoutParams(popupWidth, POPUP_HEIGHT)
                  }
                  outer.addView(tabRow); outer.addView(contentBox)

                  switchTab(activeClipTab)

                  clipboardPopup = PopupWindow(outer, popupWidth, POPUP_HEIGHT, true).apply {
                      setBackgroundDrawable(ColorDrawable(Color.TRANSPARENT))
                      isOutsideTouchable = true; isFocusable = true; elevation = 8f
                      showAtLocation(rootFrame, Gravity.CENTER, 0, 0)
                  }
              }

              private fun showDeleteConfirm(anchor: View, onConfirm: () -> Unit) {
                  confirmPopup?.dismiss()
                  val d = resources.displayMetrics.density
                  val dp4 = (4 * d).toInt(); val dp8 = (8 * d).toInt(); val dp10 = (10 * d).toInt()
                  val layout = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL; setBackgroundResource(R.drawable.popup_border)
                      setPadding(dp8, dp4, dp8, dp4); gravity = Gravity.CENTER_VERTICAL
                  }
                  layout.addView(TextView(this).apply { text = "Delete?"; textSize = 13f; setTextColor(0xFFCCCCCC.toInt()); setPadding(0, 0, dp10, 0) })
                  val yesBtn = TextView(this).apply { text = "Yes"; textSize = 13f; setTextColor(0xFFFF5252.toInt()); setPadding(dp8, dp4, dp8, dp4) }
                  val noBtn  = TextView(this).apply { text = "No";  textSize = 13f; setTextColor(0xFF888888.toInt()); setPadding(dp8, dp4, dp4,  dp4) }
                  layout.addView(yesBtn); layout.addView(noBtn)
                  layout.measure(View.MeasureSpec.makeMeasureSpec(0, View.MeasureSpec.UNSPECIFIED), View.MeasureSpec.makeMeasureSpec(0, View.MeasureSpec.UNSPECIFIED))
                  val pw = layout.measuredWidth; val ph = layout.measuredHeight
                  confirmPopup = PopupWindow(layout, pw, ph, true).apply {
                      setBackgroundDrawable(ColorDrawable(Color.TRANSPARENT)); isOutsideTouchable = true; elevation = 12f
                      showAsDropDown(anchor, -(pw / 2), -(ph + dp8))
                  }
                  yesBtn.setOnClickListener { confirmPopup?.dismiss(); onConfirm() }
                  noBtn.setOnClickListener { confirmPopup?.dismiss() }
              }

              private fun setupKey(view: View, bgRes: Int, action: () -> Unit) {
                  if (view is TextView) view.setTag(R.id.original_bg_tag, bgRes)
                  view.setOnTouchListener { v, event ->
                      when (event.actionMasked) {
                          MotionEvent.ACTION_DOWN -> { if (v is TextView) pressKey(v); action(); true }
                          MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { if (v is TextView) releaseKey(v); true }
                          else -> true
                      }
                  }
              }

              private fun buildQwerty(): View {
                  val v = layoutInflater.inflate(R.layout.qwerty, null)
                  sugView1 = v.findViewById(R.id.sug1); sugView2 = v.findViewById(R.id.sug2); sugView3 = v.findViewById(R.id.sug3)
                  listOf(sugView1, sugView2, sugView3).forEach { sv ->
                      if (sv == null) return@forEach
                      sv.setTag(R.id.original_bg_tag, R.drawable.key_bg_dark)
                      sv.setOnTouchListener { view, event ->
                          when (event.actionMasked) {
                              MotionEvent.ACTION_DOWN -> { (view as? TextView)?.apply { setBackgroundResource(R.drawable.key_bg_pressed); setTextColor(0xFF000000.toInt()) }; true }
                              MotionEvent.ACTION_UP -> {
                                  (view as? TextView)?.let { tv ->
                                      val word = tv.text?.toString()?.trim() ?: ""; if (word.isNotEmpty()) commitSuggestion(word)
                                      tv.setBackgroundResource(tv.getTag(R.id.original_bg_tag) as? Int ?: R.drawable.key_bg_dark); tv.setTextColor(0xFFFFFFFF.toInt())
                                  }; true
                              }
                              MotionEvent.ACTION_CANCEL -> {
                                  (view as? TextView)?.let { tv -> tv.setBackgroundResource(tv.getTag(R.id.original_bg_tag) as? Int ?: R.drawable.key_bg_dark); tv.setTextColor(0xFFFFFFFF.toInt()) }; true
                              }
                              else -> true
                          }
                      }
                  }
                  val letters = "qwertyuiopasdfghjklzxcvbnm"
                  val ids = listOf(R.id.kq,R.id.kw,R.id.ke,R.id.kr,R.id.kt,R.id.ky,R.id.ku,R.id.ki,R.id.ko,R.id.kp,R.id.ka,R.id.ks,R.id.kd,R.id.kf,R.id.kg,R.id.kh,R.id.kj,R.id.kk,R.id.kl,R.id.kz,R.id.kx,R.id.kc,R.id.kv,R.id.kb,R.id.kn,R.id.km)
                  ids.forEachIndexed { i, id -> setupKey(v.findViewById<TextView>(id), R.drawable.key_bg) { typeChar(letters[i]) } }
                  val numIds = listOf(R.id.k1,R.id.k2,R.id.k3,R.id.k4,R.id.k5,R.id.k6,R.id.k7,R.id.k8,R.id.k9,R.id.k0)
                  "1234567890".forEachIndexed { i, c -> val kc = KeyEvent.KEYCODE_0 + (c - '0'); setupKey(v.findViewById<TextView>(numIds[i]), R.drawable.key_bg) { sendKey(kc); clearSugs() } }
                  val shiftKey = v.findViewById<TextView>(R.id.btn_shift)
                  shiftKey.setTag(R.id.original_bg_tag, R.drawable.key_bg_dark)
                  shiftKey.setOnTouchListener { _, event ->
                      when (event.actionMasked) {
                          MotionEvent.ACTION_DOWN -> { pressKey(shiftKey); toggleShiftState(); true }
                          MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { releaseKey(shiftKey); updateShiftKeyAppearance(shiftKey); true }
                          else -> true
                      }
                  }
                  val backspace = v.findViewById<TextView>(R.id.btn_backspace)
                  backspace.setTag(R.id.original_bg_tag, R.drawable.key_bg_dark)
                  backspace.setOnTouchListener { _, event ->
                      when (event.actionMasked) {
                          MotionEvent.ACTION_DOWN -> {
                              pressKey(backspace); sendKey(KeyEvent.KEYCODE_DEL)
                              bsRunnable = object : Runnable { override fun run() { sendKey(KeyEvent.KEYCODE_DEL); bsHandler.postDelayed(this, 50) } }
                              bsHandler.postDelayed(bsRunnable!!, 300); true
                          }
                          MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { releaseKey(backspace); stopBackspaceRepeat(); bsHandler.postDelayed({ updateSuggestions() }, 80); true }
                          else -> true
                      }
                  }
                  val spaceView = v.findViewById<TextView>(R.id.btn_space)
                  spaceView.setTag(R.id.original_bg_tag, R.drawable.key_bg_dark)
                  var startX = 0f; var dragStarted = false; var lastCursorMoveX = 0f
                  val DRAG_THRESHOLD = 50.dp.toFloat(); val CURSOR_INTERVAL = 20.dp.toFloat()
                  spaceView.setOnTouchListener { _, event ->
                      when (event.actionMasked) {
                          MotionEvent.ACTION_DOWN -> { pressKey(spaceView); startX = event.x; dragStarted = false; lastCursorMoveX = startX; true }
                          MotionEvent.ACTION_MOVE -> {
                              val delta = event.x - startX
                              if (abs(delta) >= DRAG_THRESHOLD && !dragStarted) { dragStarted = true; moveCursor(delta > 0); lastCursorMoveX = event.x }
                              else if (dragStarted) { val dx = event.x - lastCursorMoveX; if (abs(dx) >= CURSOR_INTERVAL) { moveCursor(dx > 0); lastCursorMoveX = event.x } }; true
                          }
                          MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { releaseKey(spaceView); if (!dragStarted) { sendKey(KeyEvent.KEYCODE_SPACE); clearSugs() }; dragStarted = false; true }
                          else -> true
                      }
                  }
                  setupKey(v.findViewById<TextView>(R.id.btn_comma),  R.drawable.key_bg)        { sendKey(KeyEvent.KEYCODE_COMMA);  clearSugs() }
                  setupKey(v.findViewById<TextView>(R.id.btn_period), R.drawable.key_bg)        { sendKey(KeyEvent.KEYCODE_PERIOD); clearSugs() }
                  setupKey(v.findViewById<TextView>(R.id.btn_enter),  R.drawable.key_bg_action) { sendKey(KeyEvent.KEYCODE_ENTER);  clearSugs() }
                  val symbolsBtn = v.findViewById<TextView>(R.id.btn_symbols); setupKey(symbolsBtn, R.drawable.key_bg_dark) { showSymbolsPopup(symbolsBtn) }
                  val emojiBtn = v.findViewById<TextView>(R.id.btn_emoji); setupKey(emojiBtn, R.drawable.key_bg_dark) { showEmojiPopup(emojiBtn) }
                  val clipboardBtn = v.findViewById<TextView>(R.id.btn_clipboard)
                  setupKey(clipboardBtn, R.drawable.key_bg_dark) {
                      val clip = (getSystemService(Context.CLIPBOARD_SERVICE) as? ClipboardManager)?.primaryClip?.getItemAt(0)?.text?.toString()
                      if (!clip.isNullOrEmpty()) addToClipboard(clip); showClipboardPopup(clipboardBtn)
                  }
                  val toolsBtn = v.findViewById<TextView>(R.id.btn_tools); setupKey(toolsBtn, R.drawable.key_bg_dark) { showToolsPopup(toolsBtn) }
                  val keyA = v.findViewById<TextView>(R.id.ka); val keyL = v.findViewById<TextView>(R.id.kl)
                  v.findViewById<View>(R.id.asdf_spacer_left)?.setOnTouchListener { _, event ->
                      when (event.actionMasked) { MotionEvent.ACTION_DOWN -> { keyA?.let { pressKey(it) }; typeChar('a'); true }; MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { keyA?.let { releaseKey(it) }; true }; else -> true }
                  }
                  v.findViewById<View>(R.id.asdf_spacer_right)?.setOnTouchListener { _, event ->
                      when (event.actionMasked) { MotionEvent.ACTION_DOWN -> { keyL?.let { pressKey(it) }; typeChar('l'); true }; MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { keyL?.let { releaseKey(it) }; true }; else -> true }
                  }
                  return v
              }

              private fun showToolsPopup(anchor: View) {
                  toolsPopup?.dismiss()
                  val popup = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; setBackgroundResource(R.drawable.popup_border) }
                  listOf("Select All", "Copy", "Paste").forEach { label ->
                      popup.addView(TextView(this).apply {
                          text = label; textSize = 20f; setTextColor(0xFFFFFFFF.toInt()); setPadding(16.dp, 10.dp, 16.dp, 10.dp)
                          setOnTouchListener { v, event ->
                              when (event.actionMasked) {
                                  MotionEvent.ACTION_DOWN -> { (v as? TextView)?.apply { setBackgroundColor(0xFFFFFFFF.toInt()); setTextColor(0xFF000000.toInt()) }; true }
                                  MotionEvent.ACTION_UP -> {
                                      when (label) {
                                          "Select All" -> currentInputConnection?.performContextMenuAction(android.R.id.selectAll)
                                          "Copy"       -> currentInputConnection?.performContextMenuAction(android.R.id.copy)
                                          "Paste"      -> { val clip = (getSystemService(Context.CLIPBOARD_SERVICE) as ClipboardManager).primaryClip?.getItemAt(0)?.coerceToText(this@Keyboard)?.toString(); if (!clip.isNullOrEmpty()) { commitText(clip); addToClipboard(clip) } }
                                      }
                                      (v as? TextView)?.apply { setBackgroundColor(0x00000000.toInt()); setTextColor(0xFFFFFFFF.toInt()) }; true
                                  }
                                  MotionEvent.ACTION_CANCEL -> { (v as? TextView)?.apply { setBackgroundColor(0x00000000.toInt()); setTextColor(0xFFFFFFFF.toInt()) }; true }
                                  else -> false
                              }
                          }
                      })
                  }
                  popup.measure(View.MeasureSpec.makeMeasureSpec(0, View.MeasureSpec.UNSPECIFIED), View.MeasureSpec.makeMeasureSpec(0, View.MeasureSpec.UNSPECIFIED))
                  toolsPopup = PopupWindow(popup, popup.measuredWidth, popup.measuredHeight, true).apply {
                      setBackgroundDrawable(ColorDrawable(Color.TRANSPARENT)); isOutsideTouchable = true; elevation = 8f
                      showAsDropDown(anchor, 0, -popup.measuredHeight)
                  }
              }

              private fun typeChar(c: Char) {
                  val kc = KeyEvent.KEYCODE_A + (c.lowercaseChar() - 'a')
                  val meta = if (shiftState != ShiftState.OFF) KeyEvent.META_SHIFT_ON else 0
                  sendKey(kc, meta)
                  if (shiftState == ShiftState.ONCE) { shiftState = ShiftState.OFF; updateShiftKeyAppearance(qwertyView.findViewById(R.id.btn_shift)); updateLetterKeys(qwertyView) }
                  bsHandler.postDelayed({ updateSuggestions() }, 80)
              }

              private fun commitText(s: String) { currentInputConnection?.commitText(s, 1) }
              private fun commitEmoji(emoji: String) { commitText(emoji); addToRecentEmoji(emoji) }
              private fun stopBackspaceRepeat() { bsRunnable?.let { bsHandler.removeCallbacks(it) }; bsRunnable = null }

              private fun toggleShiftState() {
                  val now = System.currentTimeMillis()
                  shiftState = when { shiftState == ShiftState.LOCKED -> ShiftState.OFF; now - lastShiftTap < 200 -> ShiftState.LOCKED; shiftState == ShiftState.OFF -> ShiftState.ONCE; else -> ShiftState.OFF }
                  lastShiftTap = now; updateLetterKeys(qwertyView)
              }

              private fun updateShiftKeyAppearance(shiftView: TextView) {
                  shiftView.text = when (shiftState) { ShiftState.LOCKED -> "CAPS"; ShiftState.ONCE -> "SHFT"; ShiftState.OFF -> "Shft" }
                  shiftView.setTextColor(if (shiftState == ShiftState.OFF) 0xFFFFFFFF.toInt() else 0xFF4FC3F7.toInt())
              }

              private fun updateLetterKeys(v: View) {
                  val upper = shiftState != ShiftState.OFF; val letters = "qwertyuiopasdfghjklzxcvbnm"
                  listOf(R.id.kq,R.id.kw,R.id.ke,R.id.kr,R.id.kt,R.id.ky,R.id.ku,R.id.ki,R.id.ko,R.id.kp,R.id.ka,R.id.ks,R.id.kd,R.id.kf,R.id.kg,R.id.kh,R.id.kj,R.id.kk,R.id.kl,R.id.kz,R.id.kx,R.id.kc,R.id.kv,R.id.kb,R.id.kn,R.id.km).forEachIndexed { i, id ->
                      v.findViewById<TextView>(id)?.text = if (upper) letters[i].uppercaseChar().toString() else letters[i].toString()
                  }
              }

              private fun extractCurrentWordRaw(before: String): String {
                  val s = before.trimEnd(' '); val idx = s.indexOfLast { !it.isLetter() }
                  return if (idx < 0) s else s.substring(idx + 1)
              }

              private fun updateSuggestions() {
                  val ic = currentInputConnection ?: run { clearSugs(); return }
                  val before = ic.getTextBeforeCursor(50, 0)?.toString() ?: run { clearSugs(); return }
                  val rawWord = extractCurrentWordRaw(before); val word = rawWord.lowercase()
                  if (word.isEmpty()) { clearSugs(); return }
                  Thread {
                      val matches = try { assets.open("words.txt").bufferedReader().useLines { lines -> lines.map { it.trim().lowercase() }.filter { it.isNotEmpty() && it.startsWith(word) }.take(3).toList() } } catch (e: Exception) { emptyList() }
                      bsHandler.post { applySuggestions(rawWord, matches) }
                  }.start()
              }

              private fun applySuggestions(rawWord: String, matches: List<String>) {
                  if (matches.isEmpty()) {
                      val span = SpannableString(rawWord); span.setSpan(ForegroundColorSpan(0xFFFF0000.toInt()), 0, rawWord.length, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE)
                      sugView1?.text = span; sugView2?.text = ""; sugView3?.text = ""; return
                  }
                  val best = matches[0]
                  val display = if (rawWord.isNotEmpty() && rawWord[0].isUpperCase()) best.replaceFirstChar { it.uppercase() } else best
                  val prefixLen = minOf(rawWord.length, display.length)
                  val span = SpannableString(display)
                  span.setSpan(ForegroundColorSpan(0xFF4FC3F7.toInt()), 0, prefixLen, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE)
                  if (prefixLen < display.length) span.setSpan(ForegroundColorSpan(0xFFFFFFFF.toInt()), prefixLen, display.length, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE)
                  sugView1?.text = span; sugView2?.text = matches.getOrNull(1) ?: ""; sugView3?.text = matches.getOrNull(2) ?: ""
                  sugView2?.setTextColor(0xFFFFFFFF.toInt()); sugView3?.setTextColor(0xFFFFFFFF.toInt())
              }

              private fun clearSugs() { sugView1?.text = ""; sugView2?.text = ""; sugView3?.text = "" }

              private fun commitSuggestion(word: String) {
                  if (word.isEmpty()) return
                  val ic = currentInputConnection ?: return
                  val before = ic.getTextBeforeCursor(50, 0)?.toString() ?: return
                  val raw = extractCurrentWordRaw(before)
                  val result = if (raw.isNotEmpty() && raw[0].isUpperCase()) word.replaceFirstChar { it.uppercase() } else word
                  ic.deleteSurroundingText(raw.length, 0); ic.commitText("$result ", 1); clearSugs()
                  if (shiftState == ShiftState.ONCE) { shiftState = ShiftState.OFF; qwertyView.post { updateShiftKeyAppearance(qwertyView.findViewById(R.id.btn_shift)); updateLetterKeys(qwertyView) } }
              }

              class ClipboardAdapter(
                  private val items: MutableList<String>,
                  private val showSaveBtn: Boolean,
                  private val onPaste: (String) -> Unit,
                  private val onSave: ((String) -> Unit)?,
                  private val onDeleteRequest: (Int, View) -> Unit,
                  private val onPreviewStart: (String) -> Unit,
                  private val onPreviewEnd: () -> Unit
              ) : RecyclerView.Adapter<ClipboardAdapter.VH>() {

                  private val handler = Handler(Looper.getMainLooper())

                  inner class VH(val root: LinearLayout, val tv: TextView, val saveBtn: TextView?, val del: TextView) : RecyclerView.ViewHolder(root)

                  override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): VH {
                      val ctx = parent.context; val d = ctx.resources.displayMetrics.density
                      val dp3 = (3 * d).toInt(); val dp4 = (4 * d).toInt(); val dp8 = (8 * d).toInt(); val dp12 = (12 * d).toInt()
                      val root = LinearLayout(ctx).apply {
                          orientation = LinearLayout.HORIZONTAL; setPadding(dp12, dp8, dp8, dp8)
                          layoutParams = RecyclerView.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT).apply { bottomMargin = dp3 }
                      }
                      val tv = TextView(ctx).apply {
                          layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f)
                          setTextColor(0xFFCCCCCC.toInt()); textSize = 16f; maxLines = 1; ellipsize = android.text.TextUtils.TruncateAt.END
                      }
                      val saveBtn = if (showSaveBtn) TextView(ctx).apply { text = "★"; setTextColor(0xFF555555.toInt()); textSize = 16f; setPadding(dp8, 0, dp4, 0) } else null
                      val del = TextView(ctx).apply { text = "✕"; setTextColor(0xFF555555.toInt()); textSize = 16f; setPadding(dp8, 0, dp8, 0) }
                      root.addView(tv); saveBtn?.let { root.addView(it) }; root.addView(del)
                      return VH(root, tv, saveBtn, del)
                  }

                  override fun onBindViewHolder(h: VH, pos: Int) {
                      h.tv.text = items[pos]
                      var longPressRunnable: Runnable? = null
                      h.root.setOnTouchListener { _, event ->
                          when (event.actionMasked) {
                              MotionEvent.ACTION_DOWN -> {
                                  h.root.setBackgroundColor(0xFF303030.toInt())
                                  val sp = h.adapterPosition
                                  if (sp >= 0 && sp < items.size) {
                                      longPressRunnable = Runnable { onPreviewStart(items[sp]) }
                                      handler.postDelayed(longPressRunnable!!, 500)
                                  }
                                  false
                              }
                              MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> {
                                  h.root.setBackgroundColor(0x00000000.toInt())
                                  longPressRunnable?.let { handler.removeCallbacks(it) }; longPressRunnable = null
                                  onPreviewEnd()
                                  false
                              }
                              else -> false
                          }
                      }
                      h.root.setOnClickListener { val sp = h.adapterPosition; if (sp >= 0 && sp < items.size) onPaste(items[sp]) }
                      h.saveBtn?.setOnClickListener { v -> val sp = h.adapterPosition; if (sp >= 0 && sp < items.size) { onSave?.invoke(items[sp]); (v as? TextView)?.apply { setTextColor(0xFF4FC3F7.toInt()); handler.postDelayed({ setTextColor(0xFF555555.toInt()) }, 800) } } }
                      h.del.setOnClickListener { val sp = h.adapterPosition; if (sp >= 0) onDeleteRequest(sp, h.del) }
                  }

                  override fun getItemCount() = items.size
              }

              private fun addToClipboard(text: String) {
                  clipboardItems.remove(text); clipboardItems.add(0, text)
                  if (clipboardItems.size > MAX_CLIP) clipboardItems.removeAt(clipboardItems.size - 1)
                  saveClipboard(); clipAdapter?.notifyDataSetChanged()
              }

              private fun saveClipboard() { getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).edit().putString(PREFS_CLIP, clipboardItems.take(MAX_CLIP).joinToString("\u001F")).apply() }
              private fun loadClipboard() { val s = getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).getString(PREFS_CLIP, "") ?: ""; clipboardItems.clear(); if (s.isNotEmpty()) clipboardItems.addAll(s.split("\u001F")) }
              private fun saveSavedItems() { getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).edit().putString(PREFS_SAVED, savedItems.take(MAX_SAVED).joinToString("\u001F")).apply() }
              private fun loadSavedItems() { val s = getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).getString(PREFS_SAVED, "") ?: ""; savedItems.clear(); if (s.isNotEmpty()) savedItems.addAll(s.split("\u001F")) }
              private fun addToRecentEmoji(emoji: String) { recentEmojis.remove(emoji); recentEmojis.add(0, emoji); if (recentEmojis.size > MAX_RECENT_EMOJI) recentEmojis.removeAt(recentEmojis.size - 1); saveRecentEmojis() }
              private fun saveRecentEmojis() { getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).edit().putString(PREFS_RECENT_EMOJI, recentEmojis.take(MAX_RECENT_EMOJI).joinToString("\u001F")).apply() }
              private fun loadRecentEmojis() { val s = getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).getString(PREFS_RECENT_EMOJI, "") ?: ""; recentEmojis.clear(); if (s.isNotEmpty()) recentEmojis.addAll(s.split("\u001F")) }

              private val Int.dp get() = (this * resources.displayMetrics.density).toInt()

              override fun onDestroy() {
                  super.onDestroy(); stopBackspaceRepeat()
                  toolsPopup?.dismiss(); symbolsPopup?.dismiss(); emojiPopup?.dismiss(); clipboardPopup?.dismiss(); confirmPopup?.dismiss()
              }
          }
          ENDOFFILE

      - name: Generate Gradle Scripts
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          cat > settings.gradle.kts << 'ENDOFFILE'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "GreyB"
          include(":app")
          ENDOFFILE

          cat > build.gradle.kts << 'ENDOFFILE'
          plugins {
              id("com.android.application") version "8.9.1" apply false
              id("org.jetbrains.kotlin.android") version "2.2.0" apply false
          }
          ENDOFFILE

          cat > app/build.gradle.kts << APPEOF
          plugins { id("com.android.application"); id("org.jetbrains.kotlin.android") }
          android {
              namespace = "com.greyb.keyboard"; compileSdk = 36
              defaultConfig { applicationId = "com.greyb.keyboard"; minSdk = 26; targetSdk = 36; versionCode = ${BUILD_NUMBER}; versionName = "${BUILD_NUMBER}" }
              signingConfigs { create("release") { storeFile = file("release.keystore"); storePassword = "greyb2024"; keyAlias = "greyb"; keyPassword = "greyb2024" } }
              buildTypes { release { isMinifyEnabled = true; isShrinkResources = true; proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt")); signingConfig = signingConfigs.getByName("release") } }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies { implementation("androidx.recyclerview:recyclerview:1.3.2"); implementation("androidx.core:core-ktx:1.13.1") }
          APPEOF

          cat > gradle.properties << 'ENDOFFILE'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC
          kotlin.code.style=official
          android.suppressUnsupportedCompileSdk=36
          ENDOFFILE

      - name: Generate fixed keystore (if missing)
        run: |
          if [ ! -f app/release.keystore ]; then
            keytool -genkey -v -keystore app/release.keystore -alias greyb -keyalg RSA -keysize 2048 -validity 10000 -storepass greyb2024 -keypass greyb2024 -dname "CN=GreyB, OU=GreyB, O=GreyB Keyboard, L=Test, S=Test, C=US"
            echo "✅ New keystore created"
          else
            echo "✅ Using existing cached keystore"
          fi

      - name: Generate launcher icons
        run: |
          rm -rf app/src/main/res/mipmap-*
          pip3 install Pillow --quiet --break-system-packages 2>/dev/null || pip install Pillow --quiet
          python3 << 'ENDOFFILE'
          from PIL import Image, ImageDraw
          import os

          def make_icon(size):
              BG=(42,45,52,255); ACCENT=(90,93,100,255); WHITE=(255,255,255,255)
              img=Image.new('RGBA',(size,size),BG); d=ImageDraw.Draw(img)
              margin=size//5; key_w=(size-2*margin)//4; key_h=(size-2*margin)//5; gap=max(1,size//40); start_y=margin+key_h
              for row in range(3):
                  y=start_y+row*(key_h+gap); keys_in_row=[4,4,3]; row_margin=(size-keys_in_row[row]*(key_w+gap)+gap)//2
                  for col in range(keys_in_row[row]):
                      x=row_margin+col*(key_w+gap); color=ACCENT if (row==0 and col==0) else WHITE
                      d.rounded_rectangle([x,y,x+key_w,y+key_h],radius=key_w//5,fill=color)
              space_y=start_y+3*(key_h+gap); space_w=key_w*2+gap; space_x=(size-space_w)//2
              d.rounded_rectangle([space_x,space_y,space_x+space_w,space_y+key_h],radius=key_w//5,fill=ACCENT)
              return img

          sizes={'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
          for density,s in sizes.items():
              path=f'app/src/main/res/mipmap-{density}'; os.makedirs(path,exist_ok=True)
              icon=make_icon(s); icon.save(f'{path}/ic_launcher.png'); icon.save(f'{path}/ic_launcher_round.png')
          print("Icons generated!")
          ENDOFFILE

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - name: Clean build
        run: rm -rf app/build && ./gradlew clean --no-daemon

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK signing
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
              echo "✅ Release APK generated"
              echo "📦 APK size: $(ls -lh "$APK_PATH" | awk '{print $5}')"
              BT_PATH=$(ls -d $ANDROID_HOME/build-tools/* 2>/dev/null | head -1)
              if [ -n "$BT_PATH" ]; then $BT_PATH/apksigner verify --print-certs "$APK_PATH" 2>/dev/null || echo "⚠️ apksigner verify skipped"; fi
          else echo "❌ Release APK not found"; exit 1; fi

      - name: Bundle APK + source
        run: |
          mkdir -p GreyB-release
          cp app/build/outputs/apk/release/app-release.apk GreyB-release/GreyB.apk
          cp app/src/main/java/com/greyb/keyboard/Keyboard.kt GreyB-release/
          cp app/src/main/java/com/greyb/keyboard/MainActivity.kt GreyB-release/
          cp app/src/main/res/layout/qwerty.xml GreyB-release/
          cp .github/workflows/build.yml GreyB-release/
          cp words.txt GreyB-release/ 2>/dev/null || true
          APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')
          cat > GreyB-release/BUILD_INFO.txt << INFOEOF
          Build:      #${{ github.run_number }}
          Commit:     ${{ github.sha }}
          Timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Signed:     Yes (fixed key)
          APK Size:   ${APK_SIZE}
          Optimized:  Yes (ProGuard/R8 enabled)
          INFOEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreyB-${{ github.run_number }}
          path: GreyB-release/
          retention-days: 30
