name: Build GreyB Launcher

on:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Central Config
        run: |
          echo "APP_NAME=GreyB Launcher" >> $GITHUB_ENV
          echo "PACKAGE_NAME=com.greyb.launcher" >> $GITHUB_ENV
          echo "ITEM_PADDING_DP=12" >> $GITHUB_ENV
          echo "GRID_SPAN_COUNT=6" >> $GITHUB_ENV
          echo "RECYCLER_HEIGHT_WEIGHT=1" >> $GITHUB_ENV
          echo "COLOR_PRIMARY=#1e1e1e" >> $GITHUB_ENV
          echo "COLOR_SURFACE=#2c2c2c" >> $GITHUB_ENV
          echo "COLOR_ACCENT=#1565C0" >> $GITHUB_ENV
          echo "COLOR_TEXT_NORMAL=#FFFFFF" >> $GITHUB_ENV
          echo "COLOR_TEXT_SECONDARY=#AAAAAA" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate project structure
        run: |
          mkdir -p app/src/main/java/com/greyb/launcher
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Generate all source files
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          # Generate AndroidManifest.xml
          python3 -c "
          content = '''<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"
              xmlns:tools=\"http://schemas.android.com/tools\">
              <uses-permission android:name=\"android.permission.READ_LOGS\" tools:ignore=\"ProtectedPermissions\" />
              <application
                  android:allowBackup=\"true\"
                  android:icon=\"@mipmap/ic_launcher\"
                  android:label=\"GreyB Launcher\"
                  android:theme=\"@style/AppTheme\"
                  android:supportsRtl=\"true\">
                  <activity
                      android:name=\".MainActivity\"
                      android:exported=\"true\">
                      <intent-filter>
                          <action android:name=\"android.intent.action.MAIN\" />
                          <category android:name=\"android.intent.category.LAUNCHER\" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>'''
          with open('app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)
          "

          # Generate MainActivity.kt
          python3 -c "
          content = open('/dev/stdin').read()
          with open('app/src/main/java/com/greyb/launcher/MainActivity.kt', 'w') as f:
              f.write(content)
          " << 'PYEOF'
package com.greyb.launcher
import android.content.ClipData
import android.content.ClipboardManager
import android.content.Context
import android.os.Bundle
import android.widget.TextView
import androidx.appcompat.app.AppCompatActivity
import androidx.recyclerview.widget.GridLayoutManager
import androidx.recyclerview.widget.LinearLayoutManager
import androidx.recyclerview.widget.RecyclerView
import java.util.*

class MainActivity : AppCompatActivity() {

    private lateinit var emojiRecyclerView: RecyclerView
    private lateinit var clipboardRecyclerView: RecyclerView
    private lateinit var emojiAdapter: EmojiAdapter
    private lateinit var clipboardAdapter: ClipboardAdapter
    private lateinit var clipboardManager: ClipboardManager
    private val clipboardItems = mutableListOf<String>()

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_main)

        window.statusBarColor = 0xFF1e1e1e.toInt()
        window.navigationBarColor = 0xFF1e1e1e.toInt()

        emojiRecyclerView = findViewById(R.id.emojiRecyclerView)
        clipboardRecyclerView = findViewById(R.id.clipboardRecyclerView)

        clipboardManager = getSystemService(Context.CLIPBOARD_SERVICE) as ClipboardManager

        setupEmojiRecyclerView()
        setupClipboardRecyclerView()
        loadInitialClipboardContent()
    }

    private fun setupEmojiRecyclerView() {
        emojiAdapter = EmojiAdapter(getEmojiData())
        emojiRecyclerView.layoutManager = GridLayoutManager(this, 6)
        emojiRecyclerView.adapter = emojiAdapter
    }

    private fun setupClipboardRecyclerView() {
        clipboardAdapter = ClipboardAdapter(clipboardItems)
        clipboardRecyclerView.layoutManager = LinearLayoutManager(this)
        clipboardRecyclerView.adapter = clipboardAdapter
    }
    private fun loadInitialClipboardContent() {
        val primaryClip = clipboardManager.primaryClip
        if (primaryClip != null && primaryClip.itemCount > 0) {
            val content = primaryClip.getItemAt(0).text?.toString()
            if (!content.isNullOrEmpty() && !clipboardItems.contains(content)) {
                clipboardItems.add(0, content)
                clipboardAdapter.notifyItemInserted(0)
            }
        }
    }

    override fun onResume() {
        super.onResume()
        clipboardManager.addPrimaryClipChangedListener(clipboardListener)
    }

    override fun onPause() {
        super.onPause()
        clipboardManager.removePrimaryClipChangedListener(clipboardListener)
    }

    private val clipboardListener = ClipboardManager.OnPrimaryClipChangedListener {
        val primaryClip = clipboardManager.primaryClip
        if (primaryClip != null && primaryClip.itemCount > 0) {
            val content = primaryClip.getItemAt(0).text?.toString()
            if (!content.isNullOrEmpty() && !clipboardItems.contains(content)) {
                clipboardItems.add(0, content)
                clipboardAdapter.notifyItemInserted(0)
                clipboardRecyclerView.scrollToPosition(0)
            }
        }
    }

