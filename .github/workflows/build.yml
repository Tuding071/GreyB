name: Build GreyB Keyboard

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Keyboard.kt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Keyboard.kt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate project structure
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          PKG=app/src/main/java/com/greyb/keyboard
          mkdir -p $PKG
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

          cat > $PKG/SoftKeyboard.kt << 'KOTLINEOF'
          package com.greyb.keyboard

          import android.inputmethodservice.InputMethodService
          import android.inputmethodservice.Keyboard
          import android.inputmethodservice.KeyboardView
          import android.text.InputType
          import android.view.KeyEvent
          import android.view.View
          import android.view.inputmethod.EditorInfo

          class SoftKeyboard : InputMethodService(), KeyboardView.OnKeyboardActionListener {

              private var mInputView: KeyboardView? = null
              private var mQwertyKeyboard: Keyboard? = null
              private var mSymbolsKeyboard: Keyboard? = null
              private var mCurKeyboard: Keyboard? = null

              private var mCapsLock = false
              private var mLastShiftTime = 0L

              override fun onCreate() {
                  super.onCreate()
              }

              override fun onInitializeInterface() {
                  if (mQwertyKeyboard != null) return
                  mQwertyKeyboard = Keyboard(this, R.xml.qwerty)
                  mSymbolsKeyboard = Keyboard(this, R.xml.symbols)
              }

              override fun onCreateInputView(): View {
                  mInputView = layoutInflater.inflate(R.layout.input, null) as KeyboardView
                  mInputView!!.setOnKeyboardActionListener(this)
                  mInputView!!.isPreviewEnabled = false
                  setKeyboard(mQwertyKeyboard!!)
                  return mInputView!!
              }

              private fun setKeyboard(nextKeyboard: Keyboard) {
                  mInputView?.setKeyboard(nextKeyboard)
              }

              override fun onStartInput(attribute: EditorInfo?, restarting: Boolean) {
                  super.onStartInput(attribute, restarting)
                  mCurKeyboard = when (attribute?.inputType?.and(InputType.TYPE_MASK_CLASS)) {
                      InputType.TYPE_CLASS_NUMBER,
                      InputType.TYPE_CLASS_DATETIME,
                      InputType.TYPE_CLASS_PHONE -> mSymbolsKeyboard
                      else -> mQwertyKeyboard
                  }
                  setKeyboard(mCurKeyboard!!)
                  updateShiftKeyState(attribute)
              }

              override fun onStartInputView(info: EditorInfo?, restarting: Boolean) {
                  super.onStartInputView(info, restarting)
                  setKeyboard(mCurKeyboard!!)
              }

              override fun onFinishInput() {
                  super.onFinishInput()
                  mCurKeyboard = mQwertyKeyboard
                  mInputView?.closing()
              }

              private fun updateShiftKeyState(attr: EditorInfo?) {
                  if (attr != null && mInputView != null && mQwertyKeyboard == mInputView!!.keyboard) {
                      var caps = 0
                      val ei = currentInputEditorInfo
                      if (ei != null && ei.inputType != InputType.TYPE_NULL) {
                          caps = currentInputConnection.cursorCapsMode(attr.inputType)
                      }
                      mInputView!!.isShifted = mCapsLock || caps != 0
                  }
              }

              override fun onKey(primaryCode: Int, keyCodes: IntArray?) {
                  val ic = currentInputConnection
                  when (primaryCode) {
                      Keyboard.KEYCODE_DONE -> {
                          ic.sendKeyEvent(KeyEvent(KeyEvent.ACTION_DOWN, KeyEvent.KEYCODE_ENTER))
                          ic.sendKeyEvent(KeyEvent(KeyEvent.ACTION_UP, KeyEvent.KEYCODE_ENTER))
                      }
                      Keyboard.KEYCODE_DELETE -> {
                          handleBackspace()
                      }
                      Keyboard.KEYCODE_SHIFT -> {
                          handleShift()
                      }
                      Keyboard.KEYCODE_MODE_CHANGE -> {
                          if (mInputView != null) {
                              val current = mInputView!!.keyboard
                              if (current == mSymbolsKeyboard) {
                                  setKeyboard(mQwertyKeyboard!!)
                              } else {
                                  setKeyboard(mSymbolsKeyboard!!)
                              }
                          }
                      }
                      else -> {
                          handleCharacter(primaryCode)
                      }
                  }
              }

              private fun handleBackspace() {
                  val ic = currentInputConnection
                  ic.sendKeyEvent(KeyEvent(KeyEvent.ACTION_DOWN, KeyEvent.KEYCODE_DEL))
                  ic.sendKeyEvent(KeyEvent(KeyEvent.ACTION_UP, KeyEvent.KEYCODE_DEL))
                  updateShiftKeyState(currentInputEditorInfo)
              }

              private fun handleShift() {
                  if (mInputView == null) return
                  val currentKeyboard = mInputView!!.keyboard
                  if (mQwertyKeyboard == currentKeyboard) {
                      checkToggleCapsLock()
                      mInputView!!.isShifted = mCapsLock || !mInputView!!.isShifted
                  }
              }

              private fun handleCharacter(primaryCode: Int) {
                  var code = primaryCode
                  if (isInputViewShown && mInputView!!.isShifted) {
                      code = Character.toUpperCase(code)
                  }
                  currentInputConnection.commitText(code.toChar().toString(), 1)
                  if (mInputView!!.isShifted && !mCapsLock) {
                      mInputView!!.isShifted = false
                  }
                  updateShiftKeyState(currentInputEditorInfo)
              }

              private fun checkToggleCapsLock() {
                  val now = System.currentTimeMillis()
                  if (mLastShiftTime + 800 > now) {
                      mCapsLock = !mCapsLock
                      mLastShiftTime = 0
                  } else {
                      mLastShiftTime = now
                  }
              }

              override fun onText(text: CharSequence?) {}

              override fun swipeLeft() {}
              override fun swipeRight() {}
              override fun swipeDown() {}
              override fun swipeUp() {}
              override fun onPress(primaryCode: Int) {}
              override fun onRelease(primaryCode: Int) {}

              override fun onEvaluateFullscreenMode(): Boolean = false
          }
          KOTLINEOF

          cat > app/src/main/res/layout/input.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <android.inputmethodservice.KeyboardView
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/keyboard"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:layout_alignParentBottom="true"
              android:background="#1A1A1A"
              android:keyBackground="@drawable/key_bg"
              android:keyTextColor="#DCDCD7"
              android:keyTextSize="16sp"
              android:labelTextSize="16sp"/>
          EOF

          cat > app/src/main/res/drawable/key_bg.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_pressed="true">
                  <shape android:shape="rectangle">
                      <solid android:color="#B4B4AA"/>
                      <corners android:radius="4dp"/>
                  </shape>
              </item>
              <item android:state_checkable="true" android:state_checked="true">
                  <shape android:shape="rectangle">
                      <solid android:color="#B4B4AA"/>
                      <corners android:radius="4dp"/>
                  </shape>
              </item>
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="#2A2A2A"/>
                      <corners android:radius="4dp"/>
                  </shape>
              </item>
          </selector>
          EOF

          cat > app/src/main/res/xml/qwerty.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <Keyboard xmlns:android="http://schemas.android.com/apk/res/android"
              android:keyWidth="10%p"
              android:keyHeight="48dp"
              android:horizontalGap="1dp"
              android:verticalGap="1dp">

              <Row>
                  <Key android:codes="49" android:keyLabel="1"/>
                  <Key android:codes="50" android:keyLabel="2"/>
                  <Key android:codes="51" android:keyLabel="3"/>
                  <Key android:codes="52" android:keyLabel="4"/>
                  <Key android:codes="53" android:keyLabel="5"/>
                  <Key android:codes="54" android:keyLabel="6"/>
                  <Key android:codes="55" android:keyLabel="7"/>
                  <Key android:codes="56" android:keyLabel="8"/>
                  <Key android:codes="57" android:keyLabel="9"/>
                  <Key android:codes="48" android:keyLabel="0"/>
              </Row>

              <Row>
                  <Key android:codes="113" android:keyLabel="q"/>
                  <Key android:codes="119" android:keyLabel="w"/>
                  <Key android:codes="101" android:keyLabel="e"/>
                  <Key android:codes="114" android:keyLabel="r"/>
                  <Key android:codes="116" android:keyLabel="t"/>
                  <Key android:codes="121" android:keyLabel="y"/>
                  <Key android:codes="117" android:keyLabel="u"/>
                  <Key android:codes="105" android:keyLabel="i"/>
                  <Key android:codes="111" android:keyLabel="o"/>
                  <Key android:codes="112" android:keyLabel="p"/>
              </Row>

              <Row>
                  <Key android:codes="97" android:keyLabel="a" android:horizontalGap="1%p"/>
                  <Key android:codes="115" android:keyLabel="s"/>
                  <Key android:codes="100" android:keyLabel="d"/>
                  <Key android:codes="102" android:keyLabel="f"/>
                  <Key android:codes="103" android:keyLabel="g"/>
                  <Key android:codes="104" android:keyLabel="h"/>
                  <Key android:codes="106" android:keyLabel="j"/>
                  <Key android:codes="107" android:keyLabel="k"/>
                  <Key android:codes="108" android:keyLabel="l" android:width="11%p"/>
              </Row>

              <Row>
                  <Key android:codes="-1" android:keyLabel="@string/shift" android:keyWidth="14%p" android:isModifier="true" android:isSticky="true"/>
                  <Key android:codes="122" android:keyLabel="z"/>
                  <Key android:codes="120" android:keyLabel="x"/>
                  <Key android:codes="99" android:keyLabel="c"/>
                  <Key android:codes="118" android:keyLabel="v"/>
                  <Key android:codes="98" android:keyLabel="b"/>
                  <Key android:codes="110" android:keyLabel="n"/>
                  <Key android:codes="109" android:keyLabel="m"/>
                  <Key android:codes="-5" android:keyLabel="@string/backspace" android:keyWidth="14%p" android:isRepeatable="true"/>
              </Row>

              <Row android:rowEdgeFlags="bottom">
                  <Key android:codes="-2" android:keyLabel="?123" android:keyWidth="14%p"/>
                  <Key android:codes="44" android:keyLabel=","/>
                  <Key android:codes="32" android:keyLabel=" " android:keyWidth="42%p"/>
                  <Key android:codes="46" android:keyLabel="."/>
                  <Key android:codes="-4" android:keyLabel="@string/enter" android:keyWidth="14%p"/>
              </Row>

          </Keyboard>
          EOF

          cat > app/src/main/res/xml/symbols.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <Keyboard xmlns:android="http://schemas.android.com/apk/res/android"
              android:keyWidth="10%p"
              android:keyHeight="48dp"
              android:horizontalGap="1dp"
              android:verticalGap="1dp">

              <Row>
                  <Key android:codes="49" android:keyLabel="1"/>
                  <Key android:codes="50" android:keyLabel="2"/>
                  <Key android:codes="51" android:keyLabel="3"/>
                  <Key android:codes="52" android:keyLabel="4"/>
                  <Key android:codes="53" android:keyLabel="5"/>
                  <Key android:codes="54" android:keyLabel="6"/>
                  <Key android:codes="55" android:keyLabel="7"/>
                  <Key android:codes="56" android:keyLabel="8"/>
                  <Key android:codes="57" android:keyLabel="9"/>
                  <Key android:codes="48" android:keyLabel="0"/>
              </Row>

              <Row>
                  <Key android:codes="64" android:keyLabel="\@"/>
                  <Key android:codes="35" android:keyLabel="\#"/>
                  <Key android:codes="36" android:keyLabel="$"/>
                  <Key android:codes="37" android:keyLabel="%"/>
                  <Key android:codes="38" android:keyLabel="&amp;"/>
                  <Key android:codes="45" android:keyLabel="-"/>
                  <Key android:codes="43" android:keyLabel="+"/>
                  <Key android:codes="40" android:keyLabel="("/>
                  <Key android:codes="41" android:keyLabel=")"/>
                  <Key android:codes="47" android:keyLabel="/"/>
              </Row>

              <Row>
                  <Key android:codes="33" android:keyLabel="!" android:horizontalGap="1%p"/>
                  <Key android:codes="34" android:keyLabel="&quot;"/>
                  <Key android:codes="39" android:keyLabel="\'"/>
                  <Key android:codes="58" android:keyLabel=":"/>
                  <Key android:codes="59" android:keyLabel=";"/>
                  <Key android:codes="47" android:keyLabel="/"/>
                  <Key android:codes="63" android:keyLabel="\?"/>
                  <Key android:codes="126" android:keyLabel="~"/>
                  <Key android:codes="96" android:keyLabel="`" android:width="11%p"/>
              </Row>

              <Row>
                  <Key android:codes="-8" android:keyLabel="ABC" android:keyWidth="14%p"/>
                  <Key android:codes="92" android:keyLabel="\\"/>
                  <Key android:codes="124" android:keyLabel="|"/>
                  <Key android:codes="60" android:keyLabel="&lt;"/>
                  <Key android:codes="62" android:keyLabel="&gt;"/>
                  <Key android:codes="123" android:keyLabel="{"/>
                  <Key android:codes="125" android:keyLabel="}"/>
                  <Key android:codes="91" android:keyLabel="["/>
                  <Key android:codes="93" android:keyLabel="]"/>
                  <Key android:codes="-5" android:keyLabel="@string/backspace" android:keyWidth="14%p" android:isRepeatable="true"/>
              </Row>

              <Row android:rowEdgeFlags="bottom">
                  <Key android:codes="-2" android:keyLabel="?123" android:keyWidth="14%p"/>
                  <Key android:codes="44" android:keyLabel=","/>
                  <Key android:codes="32" android:keyLabel=" " android:keyWidth="42%p"/>
                  <Key android:codes="46" android:keyLabel="."/>
                  <Key android:codes="-4" android:keyLabel="@string/enter" android:keyWidth="14%p"/>
              </Row>

          </Keyboard>
          EOF

          cat > app/src/main/res/xml/method.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <input-method xmlns:android="http://schemas.android.com/apk/res/android"
              android:supportsSwitchingToNextInputMethod="true"/>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="ime_name">GreyB Keyboard</string>
              <string name="backspace">⌫</string>
              <string name="enter">⏎</string>
              <string name="shift">⇧</string>
          </resources>
          EOF

          cat > app/src/main/res/values/dimens.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <dimen name="key_height">48dp</dimen>
              <dimen name="key_text_size">16sp</dimen>
          </resources>
          EOF

          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "GreyB"
          include(":app")
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.9.1" apply false
              id("org.jetbrains.kotlin.android") version "2.2.0" apply false
          }
          EOF

          cat > app/build.gradle.kts << APP
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace  = "com.greyb.keyboard"
              compileSdk = 36

              defaultConfig {
                  applicationId = "com.greyb.keyboard"
                  minSdk        = 26
                  targetSdk     = 36
                  versionCode   = ${BUILD_NUMBER}
                  versionName   = "${BUILD_NUMBER}"
              }

              signingConfigs {
                  create("release") {
                      storeFile     = file("release.keystore")
                      storePassword = "greyb2024"
                      keyAlias      = "greyb"
                      keyPassword   = "greyb2024"
                  }
              }

              buildTypes {
                  release {
                      isMinifyEnabled = true
                      isShrinkResources = true
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"))
                      signingConfig = signingConfigs.getByName("release")
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
          }
          APP

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC
          kotlin.code.style=official
          android.suppressUnsupportedCompileSdk=36
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="false"
                  android:label="@string/ime_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round">
                  <service
                      android:name=".SoftKeyboard"
                      android:label="@string/ime_name"
                      android:permission="android.permission.BIND_INPUT_METHOD"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.view.InputMethod"/>
                      </intent-filter>
                      <meta-data
                          android:name="android.view.im"
                          android:resource="@xml/method"/>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Generate fixed keystore
        run: |
          keytool -genkey -v \
            -keystore app/release.keystore \
            -alias greyb \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass greyb2024 \
            -keypass greyb2024 \
            -dname "CN=GreyB, OU=GreyB, O=GreyB Keyboard, L=Test, S=Test, C=US"

      - name: Generate launcher icons
        run: |
          rm -rf app/src/main/res/mipmap-*
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          def make_icon(size):
              BG = (26, 26, 26, 255)
              ACCENT = (180, 180, 170, 255)
              WHITE = (220, 220, 215, 255)
              img = Image.new('RGBA', (size, size), BG)
              d = ImageDraw.Draw(img)
              margin = size // 5
              key_w = (size - 2 * margin) // 4
              key_h = (size - 2 * margin) // 5
              gap = max(1, size // 40)
              start_y = margin + key_h
              for row in range(3):
                  y = start_y + row * (key_h + gap)
                  keys_in_row = [4, 4, 3]
                  row_margin = (size - keys_in_row[row] * (key_w + gap) + gap) // 2
                  for col in range(keys_in_row[row]):
                      x = row_margin + col * (key_w + gap)
                      color = ACCENT if (row == 0 and col == 0) else WHITE
                      d.rounded_rectangle([x, y, x + key_w, y + key_h], radius=key_w // 5, fill=color)
              space_y = start_y + 3 * (key_h + gap)
              space_w = key_w * 2 + gap
              space_x = (size - space_w) // 2
              d.rounded_rectangle([space_x, space_y, space_x + space_w, space_y + key_h], radius=key_w // 5, fill=ACCENT)
              return img

          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          for density, s in sizes.items():
              path = f'app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              icon = make_icon(s)
              icon.save(f'{path}/ic_launcher.png')
              icon.save(f'{path}/ic_launcher_round.png')
          print("Icons generated!")
          PYEOF

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - name: Clean build
        run: |
          rm -rf app/build
          ./gradlew clean --no-daemon

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK signing
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
              echo "✅ Release APK generated"
              echo "📦 APK size: $(ls -lh "$APK_PATH" | awk '{print $5}')"
              $ANDROID_HOME/build-tools/36.0.0/apksigner verify --print-certs "$APK_PATH"
          else
              echo "❌ Release APK not found"
              exit 1
          fi

      - name: Bundle APK + source
        run: |
          mkdir -p GreyB-release
          cp app/build/outputs/apk/release/app-release.apk GreyB-release/GreyB.apk
          cp app/src/main/java/com/greyb/keyboard/SoftKeyboard.kt GreyB-release/
          cp .github/workflows/build.yml GreyB-release/

          APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')

          cat > GreyB-release/BUILD_INFO.txt << EOF
          Build:      #${{ github.run_number }}
          Commit:     ${{ github.sha }}
          Timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Signed:     Yes (fixed key)
          APK Size:   $APK_SIZE
          Optimized:  Yes (ProGuard/R8 enabled)
          Framework:  AOSP KeyboardView (XML-based)
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreyB-${{ github.run_number }}
          path: GreyB-release/
          retention-days: 30
