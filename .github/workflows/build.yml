name: Build GreyB Keyboard

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Keyboard.kt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Keyboard.kt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate project structure
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          PKG=app/src/main/java/com/greyb/keyboard
          mkdir -p $PKG
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

          cp Keyboard.kt $PKG/

          cat > app/src/main/res/values/attrs.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <declare-styleable name="Keyboard">
                  <attr name="keyWidth" format="dimension|fraction"/>
                  <attr name="keyHeight" format="dimension|fraction"/>
                  <attr name="keyHorizontalGap" format="dimension|fraction"/>
                  <attr name="keyVerticalGap" format="dimension|fraction"/>
              </declare-styleable>
              <declare-styleable name="Keyboard_Row">
                  <attr name="rowEdgeFlags" format="integer"/>
                  <attr name="keyboardMode" format="reference"/>
              </declare-styleable>
              <declare-styleable name="Keyboard_Key">
                  <attr name="codes" format="integer|string"/>
                  <attr name="keyLabel" format="string|reference"/>
                  <attr name="keyIcon" format="reference"/>
                  <attr name="keyEdgeFlags" format="integer"/>
                  <attr name="isSticky" format="boolean"/>
                  <attr name="isRepeatable" format="boolean"/>
                  <attr name="isModifier" format="boolean"/>
                  <attr name="keyOutputText" format="string"/>
                  <attr name="popupCharacters" format="string"/>
                  <attr name="iconPreview" format="reference"/>
              </declare-styleable>
              <declare-styleable name="KeyboardView">
                  <attr name="keyBackground" format="reference"/>
                  <attr name="keyTextColorPrimary" format="color"/>
                  <attr name="keyTextColorSecondary" format="color"/>
                  <attr name="labelTextSize" format="dimension"/>
                  <attr name="keyTextSize" format="dimension"/>
                  <attr name="useKeyPreview" format="boolean"/>
                  <attr name="useKeyTextColorSecondary" format="boolean"/>
                  <attr name="fontFamily" format="string"/>
                  <attr name="textStyle" format="integer"/>
              </declare-styleable>
          </resources>
          EOF

          cat > app/src/main/res/layout/input.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <com.greyb.keyboard.KeyboardView
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:id="@+id/keyboard"
              android:layout_width="wrap_content"
              android:layout_height="wrap_content"
              android:layout_centerHorizontal="true"
              android:layout_alignParentBottom="true"
              android:background="#801A1A1A"
              app:keyBackground="@drawable/key_bg"
              app:keyTextColorPrimary="#80DCDCD7"
              app:labelTextSize="16sp"/>
          EOF

          cat > app/src/main/res/drawable/key_bg.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_pressed="true">
                  <shape android:shape="rectangle">
                      <solid android:color="#80B4B4AA"/>
                      <corners android:radius="4dp"/>
                  </shape>
              </item>
              <item android:state_checkable="true" android:state_checked="true">
                  <shape android:shape="rectangle">
                      <solid android:color="#80B4B4AA"/>
                      <corners android:radius="4dp"/>
                  </shape>
              </item>
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="#802A2A2A"/>
                      <corners android:radius="4dp"/>
                  </shape>
              </item>
          </selector>
          EOF

          cat > app/src/main/res/xml/keyboard_qwerty.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <Keyboard xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              app:keyWidth="10%p"
              app:keyHeight="48dp"
              app:keyHorizontalGap="1dp"
              app:keyVerticalGap="1dp">

              <Row>
                  <Key app:codes="49" app:keyLabel="1" app:keyEdgeFlags="4"/>
                  <Key app:codes="50" app:keyLabel="2"/>
                  <Key app:codes="51" app:keyLabel="3"/>
                  <Key app:codes="52" app:keyLabel="4"/>
                  <Key app:codes="53" app:keyLabel="5"/>
                  <Key app:codes="54" app:keyLabel="6"/>
                  <Key app:codes="55" app:keyLabel="7"/>
                  <Key app:codes="56" app:keyLabel="8"/>
                  <Key app:codes="57" app:keyLabel="9"/>
                  <Key app:codes="48" app:keyLabel="0" app:keyEdgeFlags="2"/>
              </Row>

              <Row>
                  <Key app:codes="113" app:keyLabel="q" app:keyEdgeFlags="1"/>
                  <Key app:codes="119" app:keyLabel="w"/>
                  <Key app:codes="101" app:keyLabel="e"/>
                  <Key app:codes="114" app:keyLabel="r"/>
                  <Key app:codes="116" app:keyLabel="t"/>
                  <Key app:codes="121" app:keyLabel="y"/>
                  <Key app:codes="117" app:keyLabel="u"/>
                  <Key app:codes="105" app:keyLabel="i"/>
                  <Key app:codes="111" app:keyLabel="o"/>
                  <Key app:codes="112" app:keyLabel="p" app:keyEdgeFlags="2"/>
              </Row>

              <Row>
                  <Key app:codes="97"  app:keyLabel="a" app:keyWidth="11%p" app:keyEdgeFlags="1"/>
                  <Key app:codes="115" app:keyLabel="s"/>
                  <Key app:codes="100" app:keyLabel="d"/>
                  <Key app:codes="102" app:keyLabel="f"/>
                  <Key app:codes="103" app:keyLabel="g"/>
                  <Key app:codes="104" app:keyLabel="h"/>
                  <Key app:codes="106" app:keyLabel="j"/>
                  <Key app:codes="107" app:keyLabel="k"/>
                  <Key app:codes="108" app:keyLabel="l" app:keyWidth="11%p" app:keyEdgeFlags="2"/>
              </Row>

              <Row>
                  <Key app:codes="-1"  app:keyLabel="⇧" app:keyWidth="14%p" app:isSticky="true" app:isModifier="true" app:keyEdgeFlags="1"/>
                  <Key app:codes="122" app:keyLabel="z"/>
                  <Key app:codes="120" app:keyLabel="x"/>
                  <Key app:codes="99"  app:keyLabel="c"/>
                  <Key app:codes="118" app:keyLabel="v"/>
                  <Key app:codes="98"  app:keyLabel="b"/>
                  <Key app:codes="110" app:keyLabel="n"/>
                  <Key app:codes="109" app:keyLabel="m"/>
                  <Key app:codes="-5"  app:keyLabel="⌫" app:keyWidth="14%p" app:isRepeatable="true" app:keyEdgeFlags="2"/>
              </Row>

              <Row>
                  <Key app:codes="-2"  app:keyLabel="@string/label_symbols" app:keyWidth="14%p" app:keyEdgeFlags="1"/>
                  <Key app:codes="44"  app:keyLabel=","/>
                  <Key app:codes="32"  app:keyLabel="" app:keyWidth="42%p"/>
                  <Key app:codes="46"  app:keyLabel="."/>
                  <Key app:codes="-4"  app:keyLabel="⏎" app:keyWidth="14%p" app:keyEdgeFlags="2"/>
              </Row>

          </Keyboard>
          EOF

          cat > app/src/main/res/xml/keyboard_symbol.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <Keyboard xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              app:keyWidth="10%p"
              app:keyHeight="48dp"
              app:keyHorizontalGap="1dp"
              app:keyVerticalGap="1dp">

              <Row>
                  <Key app:codes="49"  app:keyLabel="1" app:keyEdgeFlags="4"/>
                  <Key app:codes="50"  app:keyLabel="2"/>
                  <Key app:codes="51"  app:keyLabel="3"/>
                  <Key app:codes="52"  app:keyLabel="4"/>
                  <Key app:codes="53"  app:keyLabel="5"/>
                  <Key app:codes="54"  app:keyLabel="6"/>
                  <Key app:codes="55"  app:keyLabel="7"/>
                  <Key app:codes="56"  app:keyLabel="8"/>
                  <Key app:codes="57"  app:keyLabel="9"/>
                  <Key app:codes="48"  app:keyLabel="0" app:keyEdgeFlags="2"/>
              </Row>

              <Row>
                  <Key app:codes="64"  app:keyLabel="@" app:keyEdgeFlags="1"/>
                  <Key app:codes="35"  app:keyLabel="#"/>
                  <Key app:codes="36"  app:keyLabel="$"/>
                  <Key app:codes="37"  app:keyLabel="%"/>
                  <Key app:codes="38"  app:keyLabel="&amp;"/>
                  <Key app:codes="45"  app:keyLabel="-"/>
                  <Key app:codes="43"  app:keyLabel="+"/>
                  <Key app:codes="40"  app:keyLabel="("/>
                  <Key app:codes="41"  app:keyLabel=")"/>
                  <Key app:codes="47"  app:keyLabel="/" app:keyEdgeFlags="2"/>
              </Row>

              <Row>
                  <Key app:codes="33"  app:keyLabel="!" app:keyWidth="11%p" app:keyEdgeFlags="1"/>
                  <Key app:codes="34"  app:keyLabel="&quot;"/>
                  <Key app:codes="39"  app:keyLabel="'"/>
                  <Key app:codes="58"  app:keyLabel=":"/>
                  <Key app:codes="59"  app:keyLabel=";"/>
                  <Key app:codes="47"  app:keyLabel="/"/>
                  <Key app:codes="63"  app:keyLabel="@string/label_question"/>
                  <Key app:codes="126" app:keyLabel="~"/>
                  <Key app:codes="96"  app:keyLabel="`" app:keyWidth="11%p" app:keyEdgeFlags="2"/>
              </Row>

              <Row>
                  <Key app:codes="-8"  app:keyLabel="ABC" app:keyWidth="14%p" app:keyEdgeFlags="1"/>
                  <Key app:codes="92"  app:keyLabel="\\"/>
                  <Key app:codes="124" app:keyLabel="|"/>
                  <Key app:codes="60"  app:keyLabel="&lt;"/>
                  <Key app:codes="62"  app:keyLabel="&gt;"/>
                  <Key app:codes="123" app:keyLabel="{"/>
                  <Key app:codes="125" app:keyLabel="}"/>
                  <Key app:codes="-5"  app:keyLabel="⌫" app:keyWidth="14%p" app:isRepeatable="true" app:keyEdgeFlags="2"/>
              </Row>

              <Row>
                  <Key app:codes="-2"  app:keyLabel="@string/label_symbols" app:keyWidth="14%p" app:keyEdgeFlags="1"/>
                  <Key app:codes="44"  app:keyLabel=","/>
                  <Key app:codes="32"  app:keyLabel="" app:keyWidth="42%p"/>
                  <Key app:codes="46"  app:keyLabel="."/>
                  <Key app:codes="-4"  app:keyLabel="⏎" app:keyWidth="14%p" app:keyEdgeFlags="2"/>
              </Row>

          </Keyboard>
          EOF

          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "GreyB"
          include(":app")
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.9.1" apply false
              id("org.jetbrains.kotlin.android") version "2.2.0" apply false
          }
          EOF

          cat > app/build.gradle.kts << APP
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace  = "com.greyb.keyboard"
              compileSdk = 36

              defaultConfig {
                  applicationId = "com.greyb.keyboard"
                  minSdk        = 26
                  targetSdk     = 36
                  versionCode   = ${BUILD_NUMBER}
                  versionName   = "${BUILD_NUMBER}"
              }

              signingConfigs {
                  create("release") {
                      storeFile     = file("release.keystore")
                      storePassword = "greyb2024"
                      keyAlias      = "greyb"
                      keyPassword   = "greyb2024"
                  }
              }

              buildTypes {
                  release {
                      isMinifyEnabled = true
                      isShrinkResources = true
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"))
                      signingConfig = signingConfigs.getByName("release")
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
          }
          APP

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC
          kotlin.code.style=official
          android.suppressUnsupportedCompileSdk=36
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="false"
                  android:label="@string/ime_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round">
                  <service
                      android:name=".GreyBIME"
                      android:label="@string/ime_name"
                      android:permission="android.permission.BIND_INPUT_METHOD"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.view.InputMethod"/>
                      </intent-filter>
                      <meta-data
                          android:name="android.view.im"
                          android:resource="@xml/method"/>
                  </service>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/xml/method.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <input-method xmlns:android="http://schemas.android.com/apk/res/android"
              android:supportsSwitchingToNextInputMethod="true"/>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="ime_name">GreyB Keyboard</string>
              <string name="label_symbols">\?123</string>
              <string name="label_question">?</string>
          </resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">#801A1A1A</item>
                  <item name="android:navigationBarColor">#801A1A1A</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowIsTranslucent">true</item>
              </style>
          </resources>
          EOF

      - name: Generate fixed keystore
        run: |
          keytool -genkey -v \
            -keystore app/release.keystore \
            -alias greyb \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass greyb2024 \
            -keypass greyb2024 \
            -dname "CN=GreyB, OU=GreyB, O=GreyB Keyboard, L=Test, S=Test, C=US"

      - name: Generate launcher icons
        run: |
          rm -rf app/src/main/res/mipmap-*
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          def make_icon(size):
              BG = (26, 26, 26, 128)
              ACCENT = (180, 180, 170, 128)
              WHITE = (220, 220, 215, 128)
              img = Image.new('RGBA', (size, size), BG)
              d = ImageDraw.Draw(img)
              margin = size // 5
              key_w = (size - 2 * margin) // 4
              key_h = (size - 2 * margin) // 5
              gap = max(1, size // 40)
              start_y = margin + key_h
              for row in range(3):
                  y = start_y + row * (key_h + gap)
                  keys_in_row = [4, 4, 3]
                  row_margin = (size - keys_in_row[row] * (key_w + gap) + gap) // 2
                  for col in range(keys_in_row[row]):
                      x = row_margin + col * (key_w + gap)
                      color = ACCENT if (row == 0 and col == 0) else WHITE
                      d.rounded_rectangle([x, y, x + key_w, y + key_h], radius=key_w // 5, fill=color)
              space_y = start_y + 3 * (key_h + gap)
              space_w = key_w * 2 + gap
              space_x = (size - space_w) // 2
              d.rounded_rectangle([space_x, space_y, space_x + space_w, space_y + key_h], radius=key_w // 5, fill=ACCENT)
              return img

          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          for density, s in sizes.items():
              path = f'app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              icon = make_icon(s)
              icon.save(f'{path}/ic_launcher.png')
              icon.save(f'{path}/ic_launcher_round.png')
          print("Icons generated!")
          PYEOF

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - name: Clean build
        run: |
          rm -rf app/build
          ./gradlew clean --no-daemon

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK signing
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
              echo "✅ Release APK generated"
              echo "📦 APK size: $(ls -lh "$APK_PATH" | awk '{print $5}')"
              $ANDROID_HOME/build-tools/36.0.0/apksigner verify --print-certs "$APK_PATH"
          else
              echo "❌ Release APK not found"
              exit 1
          fi

      - name: Bundle APK + source
        run: |
          mkdir -p GreyB-release
          cp app/build/outputs/apk/release/app-release.apk GreyB-release/GreyB.apk
          cp Keyboard.kt GreyB-release/
          cp .github/workflows/build.yml GreyB-release/

          APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')

          cat > GreyB-release/BUILD_INFO.txt << EOF
          Build:      #${{ github.run_number }}
          Commit:     ${{ github.sha }}
          Timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Signed:     Yes (fixed key)
          APK Size:   $APK_SIZE
          Optimized:  Yes (ProGuard/R8 enabled)
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreyB-${{ github.run_number }}
          path: GreyB-release/
          retention-days: 30
