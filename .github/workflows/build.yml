              // ── QWERTY ────────────────────────────────────────────────────────

              private fun buildQwerty(): View {
                  val v = layoutInflater.inflate(R.layout.qwerty, null)
                  sugView1 = v.findViewById(R.id.sug1); sugView2 = v.findViewById(R.id.sug2); sugView3 = v.findViewById(R.id.sug3)
                  listOf(sugView1, sugView2, sugView3).forEach { sv ->
                      if (sv == null) return@forEach
                      sv.setTag(R.id.original_bg_tag, R.drawable.key_bg_dark)
                      sv.setOnTouchListener { view, event ->
                          when (event.actionMasked) {
                              MotionEvent.ACTION_DOWN -> { (view as? TextView)?.apply { setBackgroundResource(R.drawable.key_bg_pressed); setTextColor(0xFF000000.toInt()) }; true }
                              MotionEvent.ACTION_UP -> { (view as? TextView)?.let { tv -> val word = tv.text?.toString()?.trim() ?: ""; if (word.isNotEmpty()) commitSuggestion(word); tv.setBackgroundResource(tv.getTag(R.id.original_bg_tag) as? Int ?: R.drawable.key_bg_dark); tv.setTextColor(0xFFFFFFFF.toInt()) }; true }
                              MotionEvent.ACTION_CANCEL -> { (view as? TextView)?.let { tv -> tv.setBackgroundResource(tv.getTag(R.id.original_bg_tag) as? Int ?: R.drawable.key_bg_dark); tv.setTextColor(0xFFFFFFFF.toInt()) }; true }
                              else -> true
                          }
                      }
                  }
                  val letters = "qwertyuiopasdfghjklzxcvbnm"
                  val ids = listOf(R.id.kq,R.id.kw,R.id.ke,R.id.kr,R.id.kt,R.id.ky,R.id.ku,R.id.ki,R.id.ko,R.id.kp,R.id.ka,R.id.ks,R.id.kd,R.id.kf,R.id.kg,R.id.kh,R.id.kj,R.id.kk,R.id.kl,R.id.kz,R.id.kx,R.id.kc,R.id.kv,R.id.kb,R.id.kn,R.id.km)
                  ids.forEachIndexed { i, id -> setupKey(v.findViewById<TextView>(id), R.drawable.key_bg) { typeChar(letters[i]) } }
                  val numIds = listOf(R.id.k1,R.id.k2,R.id.k3,R.id.k4,R.id.k5,R.id.k6,R.id.k7,R.id.k8,R.id.k9,R.id.k0)
                  "1234567890".forEachIndexed { i, c -> val kc = KeyEvent.KEYCODE_0 + (c - '0'); setupKey(v.findViewById<TextView>(numIds[i]), R.drawable.key_bg) { sendKey(kc); clearSugs() } }
                  val shiftKey = v.findViewById<TextView>(R.id.btn_shift)
                  shiftKey.setTag(R.id.original_bg_tag, R.drawable.key_bg_dark)
                  shiftKey.setOnTouchListener { _, e ->
                      when (e.actionMasked) {
                          MotionEvent.ACTION_DOWN -> { pressKey(shiftKey); toggleShiftState(); true }
                          MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { releaseKey(shiftKey); updateShiftKeyAppearance(shiftKey); true }
                          else -> true
                      }
                  }
                  val backspace = v.findViewById<TextView>(R.id.btn_backspace)
                  backspace.setTag(R.id.original_bg_tag, R.drawable.key_bg_dark)
                  backspace.setOnTouchListener { _, e ->
                      when (e.actionMasked) {
                          MotionEvent.ACTION_DOWN -> { pressKey(backspace); sendKey(KeyEvent.KEYCODE_DEL); bsRunnable = object : Runnable { override fun run() { sendKey(KeyEvent.KEYCODE_DEL); bsHandler.postDelayed(this, 50) } }; bsHandler.postDelayed(bsRunnable!!, 300); true }
                          MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { releaseKey(backspace); stopBackspaceRepeat(); bsHandler.postDelayed({ updateSuggestions() }, 80); true }
                          else -> true
                      }
                  }
                  val spaceView = v.findViewById<TextView>(R.id.btn_space)
                  spaceView.setTag(R.id.original_bg_tag, R.drawable.key_bg_dark)
                  var sx = 0f; var drag = false; var lx = 0f
                  val DT = 50.dp.toFloat(); val CI = 20.dp.toFloat()
                  spaceView.setOnTouchListener { _, e ->
                      when (e.actionMasked) {
                          MotionEvent.ACTION_DOWN -> { pressKey(spaceView); sx = e.x; drag = false; lx = sx; true }
                          MotionEvent.ACTION_MOVE -> { val d = e.x - sx; if (abs(d) >= DT && !drag) { drag = true; moveCursor(d > 0); lx = e.x } else if (drag) { val dd = e.x - lx; if (abs(dd) >= CI) { moveCursor(dd > 0); lx = e.x } }; true }
                          MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { releaseKey(spaceView); if (!drag) { sendKey(KeyEvent.KEYCODE_SPACE); clearSugs() }; drag = false; true }
                          else -> true
                      }
                  }
                  setupKey(v.findViewById<TextView>(R.id.btn_comma),  R.drawable.key_bg)        { sendKey(KeyEvent.KEYCODE_COMMA);  clearSugs() }
                  setupKey(v.findViewById<TextView>(R.id.btn_period), R.drawable.key_bg)        { sendKey(KeyEvent.KEYCODE_PERIOD); clearSugs() }
                  setupKey(v.findViewById<TextView>(R.id.btn_enter),  R.drawable.key_bg_action) { sendKey(KeyEvent.KEYCODE_ENTER);  clearSugs() }
                  setupPanelKey(v.findViewById(R.id.btn_clipboard), R.drawable.key_bg_dark) { showClipboardOverlay() }
                  setupPanelKey(v.findViewById(R.id.btn_tools),     R.drawable.key_bg_dark) { showToolsOverlay() }
                  setupPanelKey(v.findViewById(R.id.btn_emoji),     R.drawable.key_bg_dark) { showEmojiOverlay() }
                  setupPanelKey(v.findViewById(R.id.btn_symbols),   R.drawable.key_bg_dark) { showSymbolsOverlay() }
                  val keyA = v.findViewById<TextView>(R.id.ka); val keyL = v.findViewById<TextView>(R.id.kl)
                  v.findViewById<View>(R.id.asdf_spacer_left)?.setOnTouchListener { _, e -> when (e.actionMasked) { MotionEvent.ACTION_DOWN -> { keyA?.let { pressKey(it) }; typeChar('a'); true }; MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { keyA?.let { releaseKey(it) }; true }; else -> true } }
                  v.findViewById<View>(R.id.asdf_spacer_right)?.setOnTouchListener { _, e -> when (e.actionMasked) { MotionEvent.ACTION_DOWN -> { keyL?.let { pressKey(it) }; typeChar('l'); true }; MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { keyL?.let { releaseKey(it) }; true }; else -> true } }
                  return v
              }

              // ── Typing ────────────────────────────────────────────────────────

              private fun typeChar(c: Char) {
                  val kc = KeyEvent.KEYCODE_A + (c.lowercaseChar() - 'a')
                  val meta = if (shiftState != ShiftState.OFF) KeyEvent.META_SHIFT_ON else 0
                  sendKey(kc, meta)
                  if (shiftState == ShiftState.ONCE) { shiftState = ShiftState.OFF; updateShiftKeyAppearance(qwertyView.findViewById(R.id.btn_shift)); updateLetterKeys(qwertyView) }
                  bsHandler.postDelayed({ updateSuggestions() }, 80)
              }

              private fun commitText(s: String) { currentInputConnection?.commitText(s, 1) }
              private fun commitEmoji(emoji: String) { commitText(emoji); addToRecentEmoji(emoji) }
              private fun stopBackspaceRepeat() { bsRunnable?.let { bsHandler.removeCallbacks(it) }; bsRunnable = null }

              private fun toggleShiftState() {
                  val now = System.currentTimeMillis()
                  shiftState = when { shiftState == ShiftState.LOCKED -> ShiftState.OFF; now - lastShiftTap < 300 -> ShiftState.LOCKED; shiftState == ShiftState.OFF -> ShiftState.ONCE; else -> ShiftState.OFF }
                  lastShiftTap = now; updateLetterKeys(qwertyView)
              }

              private fun updateShiftKeyAppearance(sv: TextView) {
                  sv.text = when (shiftState) { ShiftState.LOCKED -> "CAPS"; ShiftState.ONCE -> "SHFT"; ShiftState.OFF -> "Shft" }
                  sv.setTextColor(if (shiftState == ShiftState.OFF) 0xFFFFFFFF.toInt() else 0xFF4FC3F7.toInt())
              }

              private fun updateLetterKeys(v: View) {
                  val upper = shiftState != ShiftState.OFF; val letters = "qwertyuiopasdfghjklzxcvbnm"
                  listOf(R.id.kq,R.id.kw,R.id.ke,R.id.kr,R.id.kt,R.id.ky,R.id.ku,R.id.ki,R.id.ko,R.id.kp,R.id.ka,R.id.ks,R.id.kd,R.id.kf,R.id.kg,R.id.kh,R.id.kj,R.id.kk,R.id.kl,R.id.kz,R.id.kx,R.id.kc,R.id.kv,R.id.kb,R.id.kn,R.id.km).forEachIndexed { i, id ->
                      v.findViewById<TextView>(id)?.text = if (upper) letters[i].uppercaseChar().toString() else letters[i].toString()
                  }
              }

              // ── Suggestions ───────────────────────────────────────────────────

              private fun extractCurrentWordRaw(before: String): String {
                  val s = before.trimEnd(' '); val idx = s.indexOfLast { !it.isLetter() }
                  return if (idx < 0) s else s.substring(idx + 1)
              }

              private fun updateSuggestions() {
                  val ic = currentInputConnection ?: run { clearSugs(); return }
                  val before = ic.getTextBeforeCursor(50, 0)?.toString() ?: run { clearSugs(); return }
                  val rawWord = extractCurrentWordRaw(before); val word = rawWord.lowercase()
                  if (word.isEmpty()) { clearSugs(); return }
                  Thread {
                      val matches = try { assets.open("words.txt").bufferedReader().useLines { lines -> lines.map { it.trim().lowercase() }.filter { it.isNotEmpty() && it.startsWith(word) }.take(3).toList() } } catch (e: Exception) { emptyList() }
                      bsHandler.post { applySuggestions(rawWord, matches) }
                  }.start()
              }

              private fun applySuggestions(rawWord: String, matches: List<String>) {
                  if (matches.isEmpty()) {
                      val span = SpannableString(rawWord); span.setSpan(ForegroundColorSpan(0xFFFF6B6B.toInt()), 0, rawWord.length, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE)
                      sugView1?.text = span; sugView2?.text = ""; sugView3?.text = ""; return
                  }
                  val best = matches[0]
                  val display = if (rawWord.isNotEmpty() && rawWord[0].isUpperCase()) best.replaceFirstChar { it.uppercase() } else best
                  val prefixLen = minOf(rawWord.length, display.length)
                  val span = SpannableString(display)
                  span.setSpan(ForegroundColorSpan(0xFF4FC3F7.toInt()), 0, prefixLen, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE)
                  if (prefixLen < display.length) span.setSpan(ForegroundColorSpan(0xFFFFFFFF.toInt()), prefixLen, display.length, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE)
                  sugView1?.text = span
                  sugView2?.text = matches.getOrNull(1) ?: ""; sugView2?.setTextColor(0xFFFFFFFF.toInt())
                  sugView3?.text = matches.getOrNull(2) ?: ""; sugView3?.setTextColor(0xFFFFFFFF.toInt())
              }

              private fun clearSugs() { sugView1?.text = ""; sugView2?.text = ""; sugView3?.text = "" }

              private fun commitSuggestion(word: String) {
                  if (word.isEmpty()) return
                  val ic = currentInputConnection ?: return
                  val before = ic.getTextBeforeCursor(50, 0)?.toString() ?: return
                  val raw = extractCurrentWordRaw(before)
                  val result = if (raw.isNotEmpty() && raw[0].isUpperCase()) word.replaceFirstChar { it.uppercase() } else word
                  ic.deleteSurroundingText(raw.length, 0); ic.commitText("$result ", 1); clearSugs()
                  if (shiftState == ShiftState.ONCE) { shiftState = ShiftState.OFF; qwertyView.post { updateShiftKeyAppearance(qwertyView.findViewById(R.id.btn_shift)); updateLetterKeys(qwertyView) } }
              }

              // ── Persistence ───────────────────────────────────────────────────

              private fun addToClipboard(text: String) { clipboardItems.remove(text); clipboardItems.add(0, text); if (clipboardItems.size > MAX_CLIP) clipboardItems.removeAt(clipboardItems.size - 1); saveClipboard() }
              private fun saveClipboard() { getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).edit().putString(PREFS_CLIP, clipboardItems.take(MAX_CLIP).joinToString("\u001F")).apply() }
              private fun loadClipboard() { val s = getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).getString(PREFS_CLIP, "") ?: ""; clipboardItems.clear(); if (s.isNotEmpty()) clipboardItems.addAll(s.split("\u001F")) }
              private fun saveSavedItems() { getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).edit().putString(PREFS_SAVED, savedItems.take(MAX_SAVED).joinToString("\u001F")).apply() }
              private fun loadSavedItems() { val s = getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).getString(PREFS_SAVED, "") ?: ""; savedItems.clear(); if (s.isNotEmpty()) savedItems.addAll(s.split("\u001F")) }
              private fun addToRecentEmoji(emoji: String) { recentEmojis.remove(emoji); recentEmojis.add(0, emoji); if (recentEmojis.size > MAX_RECENT_EMOJI) recentEmojis.removeAt(recentEmojis.size - 1); saveRecentEmojis() }
              private fun saveRecentEmojis() { getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).edit().putString(PREFS_RECENT_EMOJI, recentEmojis.take(MAX_RECENT_EMOJI).joinToString("\u001F")).apply() }
              private fun loadRecentEmojis() { val s = getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).getString(PREFS_RECENT_EMOJI, "") ?: ""; recentEmojis.clear(); if (s.isNotEmpty()) recentEmojis.addAll(s.split("\u001F")) }

              private val Int.dp get() = (this * resources.displayMetrics.density).toInt()

              override fun onDestroy() { super.onDestroy(); stopBackspaceRepeat() }
          }
          ENDOFFILE

      - name: Generate Gradle Scripts
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          cat > settings.gradle.kts << 'ENDOFFILE'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "GreyB"
          include(":app")
          ENDOFFILE

          cat > build.gradle.kts << 'ENDOFFILE'
          plugins {
              id("com.android.application") version "8.9.1" apply false
              id("org.jetbrains.kotlin.android") version "2.2.0" apply false
          }
          ENDOFFILE

          cat > app/build.gradle.kts << APPEOF
          plugins { id("com.android.application"); id("org.jetbrains.kotlin.android") }
          android {
              namespace = "com.greyb.keyboard"; compileSdk = 36
              defaultConfig { applicationId = "com.greyb.keyboard"; minSdk = 26; targetSdk = 36; versionCode = ${BUILD_NUMBER}; versionName = "${BUILD_NUMBER}" }
              signingConfigs { create("release") { storeFile = file("release.keystore"); storePassword = "greyb2024"; keyAlias = "greyb"; keyPassword = "greyb2024" } }
              buildTypes { release { isMinifyEnabled = true; isShrinkResources = true; proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt")); signingConfig = signingConfigs.getByName("release") } }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies { implementation("androidx.core:core-ktx:1.13.1") }
          APPEOF

          cat > gradle.properties << 'ENDOFFILE'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC
          kotlin.code.style=official
          android.suppressUnsupportedCompileSdk=36
          ENDOFFILE

      - name: Generate fixed keystore (if missing)
        run: |
          if [ ! -f app/release.keystore ]; then
            keytool -genkey -v -keystore app/release.keystore -alias greyb -keyalg RSA -keysize 2048 -validity 10000 -storepass greyb2024 -keypass greyb2024 -dname "CN=GreyB, OU=GreyB, O=GreyB Keyboard, L=Test, S=Test, C=US"
            echo "✅ New keystore created"
          else
            echo "✅ Using existing cached keystore"
          fi

      - name: Generate launcher icons
        run: |
          rm -rf app/src/main/res/mipmap-*
          pip3 install Pillow --quiet --break-system-packages 2>/dev/null || pip install Pillow --quiet
          python3 << 'ENDOFFILE'
          from PIL import Image, ImageDraw
          import os

          def make_icon(size):
              BG=(42,45,52,255); ACCENT=(90,93,100,255); WHITE=(255,255,255,255)
              img=Image.new('RGBA',(size,size),BG); d=ImageDraw.Draw(img)
              margin=size//5; key_w=(size-2*margin)//4; key_h=(size-2*margin)//5; gap=max(1,size//40); start_y=margin+key_h
              for row in range(3):
                  y=start_y+row*(key_h+gap); keys_in_row=[4,4,3]; row_margin=(size-keys_in_row[row]*(key_w+gap)+gap)//2
                  for col in range(keys_in_row[row]):
                      x=row_margin+col*(key_w+gap); color=ACCENT if (row==0 and col==0) else WHITE
                      d.rounded_rectangle([x,y,x+key_w,y+key_h],radius=key_w//5,fill=color)
              space_y=start_y+3*(key_h+gap); space_w=key_w*2+gap; space_x=(size-space_w)//2
              d.rounded_rectangle([space_x,space_y,space_x+space_w,space_y+key_h],radius=key_w//5,fill=ACCENT)
              return img

          sizes={'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
          for density,s in sizes.items():
              path=f'app/src/main/res/mipmap-{density}'; os.makedirs(path,exist_ok=True)
              icon=make_icon(s); icon.save(f'{path}/ic_launcher.png'); icon.save(f'{path}/ic_launcher_round.png')
          print("Icons generated!")
          ENDOFFILE

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - name: Clean build
        run: rm -rf app/build && ./gradlew clean --no-daemon

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK signing
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
              echo "✅ Release APK generated"
              echo "📦 APK size: $(ls -lh "$APK_PATH" | awk '{print $5}')"
              BT_PATH=$(ls -d $ANDROID_HOME/build-tools/* 2>/dev/null | head -1)
              if [ -n "$BT_PATH" ]; then $BT_PATH/apksigner verify --print-certs "$APK_PATH" 2>/dev/null || echo "⚠️ apksigner verify skipped"; fi
          else echo "❌ Release APK not found"; exit 1; fi

      - name: Bundle APK + source
        run: |
          mkdir -p GreyB-release
          cp app/build/outputs/apk/release/app-release.apk GreyB-release/GreyB.apk
          cp app/src/main/java/com/greyb/keyboard/Keyboard.kt GreyB-release/
          cp app/src/main/java/com/greyb/keyboard/MainActivity.kt GreyB-release/
          cp app/src/main/res/layout/qwerty.xml GreyB-release/
          cp .github/workflows/build.yml GreyB-release/
          cp words.txt GreyB-release/ 2>/dev/null || true
          APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')
          cat > GreyB-release/BUILD_INFO.txt << INFOEOF
          Build:      #${{ github.run_number }}
          Commit:     ${{ github.sha }}
          Timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Signed:     Yes (fixed key)
          APK Size:   ${APK_SIZE}
          Optimized:  Yes (ProGuard/R8 enabled)
          INFOEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreyB-${{ github.run_number }}
          path: GreyB-release/
          retention-days: 30
