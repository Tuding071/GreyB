name: Build GreyB Keyboard

on:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate project structure
        run: |
          mkdir -p app/src/main/java/com/greyb/keyboard
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      # ---------- Manifest (adds launcher activity) ----------
      - name: Generate AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="GreyB Keyboard"
                  android:icon="@mipmap/ic_launcher"
                  android:supportsRtl="true">

                  <!-- Launcher activity -->
                  <activity
                      android:name=".MainActivity"
                      android:label="GreyB Keyboard"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <!-- Keyboard service -->
                  <service
                      android:name=".Keyboard"
                      android:label="GreyB Keyboard"
                      android:permission="android.permission.BIND_INPUT_METHOD"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.view.InputMethod" />
                      </intent-filter>
                      <meta-data
                          android:name="android.view.im"
                          android:resource="@xml/method" />
                  </service>
              </application>
          </manifest>
          ENDOFFILE

      # ---------- Keyboard service resources ----------
      - name: Generate method.xml
        run: |
          cat > app/src/main/res/xml/method.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <input-method xmlns:android="http://schemas.android.com/apk/res/android">
              <subtype
                  android:label="English"
                  android:imeSubtypeLocale="en_US"
                  android:imeSubtypeMode="keyboard" />
          </input-method>
          ENDOFFILE

      - name: Generate drawables
        run: |
          cat > app/src/main/res/drawable/key_bg.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#333333"/>
              <corners android:radius="8dp"/>
          </shape>
          ENDOFFILE

          cat > app/src/main/res/drawable/key_bg_dark.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#2c2c2c"/>
              <corners android:radius="8dp"/>
          </shape>
          ENDOFFILE

          cat > app/src/main/res/drawable/key_bg_action.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#1565C0"/>
              <corners android:radius="8dp"/>
          </shape>
          ENDOFFILE

          cat > app/src/main/res/drawable/key_bg_accent.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#1565C0"/>
              <corners android:radius="8dp"/>
          </shape>
          ENDOFFILE

      - name: Generate values
        run: |
          cat > app/src/main/res/values/colors.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1e1e1e</color>
              <color name="colorSurface">#2c2c2c</color>
              <color name="colorAccent">#1565C0</color>
              <color name="textColorNormal">#FFFFFF</color>
              <color name="textColorSecondary">#AAAAAA</color>
          </resources>
          ENDOFFILE

          cat > app/src/main/res/values/styles.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.NoActionBar">
                  <item name="android:windowBackground">@color/colorPrimary</item>
                  <item name="android:navigationBarColor">@color/colorPrimary</item>
              </style>
          </resources>
          ENDOFFILE

      # ---------- Keyboard layouts (all rows 55dp, padding 5dp) ----------
      - name: Generate qwerty.xml
        run: |
          cat > app/src/main/res/layout/qwerty.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/qwerty_root"
              android:layout_width="match_parent"
              android:layout_height="330dp"
              android:orientation="vertical"
              android:background="#1e1e1e">

              <!-- Suggestion row (55dp) -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  android:paddingTop="5dp"
                  android:paddingBottom="5dp">

                  <TextView
                      android:id="@+id/btn_clipboard"
                      android:layout_width="42dp"
                      android:layout_height="match_parent"
                      android:gravity="center"
                      android:text="⧉"
                      android:textColor="#ffffff"
                      android:textSize="36sp"
                      android:background="@drawable/key_bg_dark" />

                  <LinearLayout
                      android:layout_width="0dp"
                      android:layout_height="match_parent"
                      android:layout_weight="1"
                      android:orientation="horizontal"
                      android:layout_marginStart="8dp"
                      android:layout_marginEnd="8dp"
                      android:gravity="center_vertical">

                      <TextView android:id="@+id/sug1"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:gravity="center"
                          android:background="@drawable/key_bg_dark"
                          android:textColor="#ffffff"
                          android:textSize="22sp"
                          android:layout_marginEnd="5dp" />

                      <TextView android:id="@+id/sug2"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:gravity="center"
                          android:background="@drawable/key_bg_dark"
                          android:textColor="#ffffff"
                          android:textSize="22sp"
                          android:layout_marginEnd="5dp" />

                      <TextView android:id="@+id/sug3"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:gravity="center"
                          android:background="@drawable/key_bg_dark"
                          android:textColor="#ffffff"
                          android:textSize="22sp" />

                  </LinearLayout>

                  <TextView
                      android:id="@+id/btn_tools"
                      android:layout_width="42dp"
                      android:layout_height="match_parent"
                      android:gravity="center"
                      android:text="✎"
                      android:textColor="#ffffff"
                      android:textSize="36sp"
                      android:background="@drawable/key_bg_dark" />

              </LinearLayout>

              <!-- Number row (55dp) -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  android:paddingTop="5dp"
                  android:paddingBottom="5dp">
                  <TextView android:id="@+id/k1" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="1" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/k2" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="2" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/k3" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="3" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/k4" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="4" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/k5" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="5" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/k6" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="6" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/k7" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="7" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/k8" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="8" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/k9" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="9" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/k0" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="0" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg"/>
              </LinearLayout>

              <!-- QWERTY row (55dp) -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  android:paddingTop="5dp"
                  android:paddingBottom="5dp">
                  <TextView android:id="@+id/kq" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="q" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kw" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="w" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/ke" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="e" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kr" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="r" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kt" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="t" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/ky" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="y" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/ku" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="u" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/ki" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="i" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/ko" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="o" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kp" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="p" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg"/>
              </LinearLayout>

              <!-- ASDF row (55dp) -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingTop="5dp"
                  android:paddingBottom="5dp">
                  <Space android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.5"/>
                  <TextView android:id="@+id/ka" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="a" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/ks" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="s" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kd" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="d" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kf" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="f" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kg" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="g" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kh" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="h" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kj" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="j" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kk" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="k" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kl" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="l" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg"/>
                  <Space android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.5"/>
              </LinearLayout>

              <!-- ZXCV row (55dp) -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  android:paddingTop="5dp"
                  android:paddingBottom="5dp">
                  <TextView android:id="@+id/btn_shift" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1.4" android:gravity="center" android:text="⇧" android:textColor="#fff" android:textSize="35sp" android:background="@drawable/key_bg_dark" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kz" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="z" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kx" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="x" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kc" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="c" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kv" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="v" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kb" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="b" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/kn" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="n" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/km" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="m" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/btn_backspace" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1.4" android:gravity="center" android:text="⌫" android:textColor="#fff" android:textSize="35sp" android:background="@drawable/key_bg_dark"/>
              </LinearLayout>

              <!-- Action row (55dp) -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  android:paddingTop="5dp"
                  android:paddingBottom="5dp">
                  <TextView android:id="@+id/btn_symbols" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1.3" android:gravity="center" android:text="\?123" android:textColor="#fff" android:textSize="26sp" android:background="@drawable/key_bg_dark" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/btn_emoji" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="☺" android:textColor="#fff" android:textSize="35sp" android:background="@drawable/key_bg_dark" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/btn_comma" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="," android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/btn_space" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="4" android:gravity="center" android:text="space" android:textColor="#888" android:textSize="26sp" android:background="@drawable/key_bg_dark" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/btn_period" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="." android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
                  <TextView android:id="@+id/btn_enter" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1.3" android:gravity="center" android:text="↵" android:textColor="#fff" android:textSize="35sp" android:background="@drawable/key_bg_action"/>
              </LinearLayout>

              <View
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:background="#1e1e1e"/>

          </LinearLayout>
          ENDOFFILE

      - name: Generate symbols.xml
        run: |
          cat > app/src/main/res/layout/symbols.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/symbols_root"
              android:layout_width="match_parent"
              android:layout_height="330dp"
              android:orientation="vertical"
              android:background="#1e1e1e">

              <!-- Suggestion row (55dp) -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  android:paddingTop="5dp"
                  android:paddingBottom="5dp">

                  <TextView
                      android:id="@+id/btn_clipboard"
                      android:layout_width="42dp"
                      android:layout_height="match_parent"
                      android:gravity="center"
                      android:text="⧉"
                      android:textColor="#ffffff"
                      android:textSize="36sp"
                      android:background="@drawable/key_bg_dark" />

                  <LinearLayout
                      android:layout_width="0dp"
                      android:layout_height="match_parent"
                      android:layout_weight="1"
                      android:orientation="horizontal"
                      android:layout_marginStart="8dp"
                      android:layout_marginEnd="8dp"
                      android:gravity="center_vertical">

                      <TextView android:id="@+id/sug1"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:gravity="center"
                          android:background="@drawable/key_bg_dark"
                          android:textColor="#ffffff"
                          android:textSize="22sp"
                          android:layout_marginEnd="5dp" />

                      <TextView android:id="@+id/sug2"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:gravity="center"
                          android:background="@drawable/key_bg_dark"
                          android:textColor="#ffffff"
                          android:textSize="22sp"
                          android:layout_marginEnd="5dp" />

                      <TextView android:id="@+id/sug3"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:gravity="center"
                          android:background="@drawable/key_bg_dark"
                          android:textColor="#ffffff"
                          android:textSize="22sp" />

                  </LinearLayout>

                  <TextView
                      android:id="@+id/btn_tools"
                      android:layout_width="42dp"
                      android:layout_height="match_parent"
                      android:gravity="center"
                      android:text="✎"
                      android:textColor="#ffffff"
                      android:textSize="36sp"
                      android:background="@drawable/key_bg_dark" />

              </LinearLayout>

              <!-- Number row (55dp) -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  android:paddingTop="5dp"
                  android:paddingBottom="5dp">
                  <TextView android:id="@+id/k1" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="1" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:layout_marginEnd="4dp"/>
