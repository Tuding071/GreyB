    override fun onCreateInputView(): View {
        window?.window?.navigationBarColor = 0xFF1e1e1e.toInt()
        rootFrame = FrameLayout(this).apply {
            layoutParams = ViewGroup.LayoutParams(
                ViewGroup.LayoutParams.MATCH_PARENT,
                ViewGroup.LayoutParams.WRAP_CONTENT
            )
        }
        qwertyView = buildQwerty()
        rootFrame.addView(qwertyView)
        return rootFrame
    }

    private fun sendKey(keyCode: Int, meta: Int = 0) {
        val ic = currentInputConnection ?: return
        val t = SystemClock.uptimeMillis()
        ic.sendKeyEvent(KeyEvent(t, t, KeyEvent.ACTION_DOWN, keyCode, 0, meta))
        ic.sendKeyEvent(KeyEvent(t, SystemClock.uptimeMillis(), KeyEvent.ACTION_UP, keyCode, 0, meta))
    }

    private fun pressKey(view: TextView) {
        view.setBackgroundResource(R.drawable.key_bg_pressed)
        view.setTextColor(0xFF000000.toInt())
    }

    private fun releaseKey(view: TextView) {
        val originalRes = view.getTag(R.id.original_bg_tag) as? Int ?: return
        view.setBackgroundResource(originalRes)
        view.setTextColor(0xFFFFFFFF.toInt())
    }

    private fun showBottomSheet(contentView: View) {
        if (isBottomSheetVisible) dismissBottomSheet()
        bottomSheetContainer = FrameLayout(this).apply {
            setBackgroundColor(0x80000000.toInt())
            setOnClickListener { dismissBottomSheet() }
        }
        val bottomSheet = LinearLayout(this).apply {
            orientation = LinearLayout.VERTICAL
            setBackgroundColor(0xFF2C2C2C.toInt())
            layoutParams = FrameLayout.LayoutParams(
                ViewGroup.LayoutParams.MATCH_PARENT,
                ViewGroup.LayoutParams.WRAP_CONTENT
            ).apply { gravity = Gravity.BOTTOM }
        }
        bottomSheet.addView(TextView(this).apply {
            text = ""
            textSize = 16f
            setTextColor(0xFFFFFFFF.toInt())
            gravity = Gravity.CENTER
            setPadding(0, 12.dp, 0, 12.dp)
        })
        bottomSheet.addView(contentView)
        bottomSheetContainer?.addView(bottomSheet)
        rootFrame.addView(bottomSheetContainer)
        bottomSheet.translationY = 500f
        bottomSheet.animate().translationY(0f).setDuration(250).start()
        isBottomSheetVisible = true
    }

    private fun dismissBottomSheet() {
        if (!isBottomSheetVisible) return
        val container = bottomSheetContainer
        if (container != null) {
            container.animate().alpha(0f).setDuration(200).withEndAction {
                rootFrame.removeView(container)
            }.start()
        }
        bottomSheetContainer = null
        isBottomSheetVisible = false
    }

    private fun createSymbolsContent(): View {
        val symbols = listOf(
            "!","@","#","$","%","&","*","(",")","+",
            "-","=","/",":",";","\"","'","?","~","_",
            "[","]","{","}","<",">","|","\\","^"
        )
        val grid = GridLayout(this).apply {
            columnCount = 10
            useDefaultMargins = true
            layoutParams = LinearLayout.LayoutParams(
                ViewGroup.LayoutParams.MATCH_PARENT,
                ViewGroup.LayoutParams.WRAP_CONTENT
            )
        }
        val cellSize = (resources.displayMetrics.widthPixels - 64.dp) / 10
        symbols.forEach { sym ->
            val tv = TextView(this).apply {
                text = sym
                textSize = 20f
                gravity = Gravity.CENTER
                setTextColor(0xFFFFFFFF.toInt())
                layoutParams = GridLayout.LayoutParams().apply {
                    width = cellSize
                    height = cellSize
                }
            }
            setupKey(tv, R.drawable.key_bg) { commitText(sym); dismissBottomSheet() }
            grid.addView(tv)
        }
        return grid
    }

    private fun createEmojiContent(): View {
        val emojis = listOf("😀","😂","😍","🥰","😎","👍","🔥","🎉")
        val grid = GridLayout(this).apply {
            columnCount = 4
            useDefaultMargins = true
            layoutParams = LinearLayout.LayoutParams(
                ViewGroup.LayoutParams.MATCH_PARENT,
                ViewGroup.LayoutParams.WRAP_CONTENT
            )
        }
        val cellSize = (resources.displayMetrics.widthPixels - 64.dp) / 4
        emojis.forEach { emoji ->
            val tv = TextView(this).apply {
                text = emoji
                textSize = 36f
                gravity = Gravity.CENTER
                layoutParams = GridLayout.LayoutParams().apply {
                    width = cellSize
                    height = cellSize
                }
            }
            setupKey(tv, R.drawable.key_bg) { commitText(emoji); dismissBottomSheet() }
            grid.addView(tv)
        }
        return grid
    }

    private fun createClipboardContent(): View {
        if (clipboardItems.isEmpty()) {
            return TextView(this).apply {
                text = "Clipboard is empty"
                textSize = 20f
                setTextColor(0xFFFFFFFF.toInt())
                gravity = Gravity.CENTER
                setPadding(16.dp, 32.dp, 16.dp, 32.dp)
            }
        }
        clipAdapter = ClipboardAdapter(
            clipboardItems,
            onPaste  = { item -> commitText(item); dismissBottomSheet() },
            onDelete = { pos ->
                clipboardItems.removeAt(pos)
                clipAdapter?.notifyItemRemoved(pos)
                saveClipboard()
                if (clipboardItems.isEmpty()) dismissBottomSheet()
            }
        )
        return RecyclerView(this).apply {
            layoutManager = LinearLayoutManager(this@Keyboard)
            adapter = clipAdapter
            layoutParams = LinearLayout.LayoutParams(
                ViewGroup.LayoutParams.MATCH_PARENT,
                (200 * resources.displayMetrics.density).toInt()
            )
        }
    }

    private fun setupKey(view: View, bgRes: Int, action: () -> Unit) {
        if (view is TextView) {
            view.setTag(R.id.original_bg_tag, bgRes)
        }
        view.setOnTouchListener { v, event ->
            when (event.actionMasked) {
                MotionEvent.ACTION_DOWN -> {
                    if (v is TextView) pressKey(v)
                    action()
                    true
                }
                MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> {
                    if (v is TextView) releaseKey(v)
                    true
                }
                else -> true
            }
        }
    }

    private fun buildQwerty(): View {
        val v = layoutInflater.inflate(R.layout.qwerty, null)

        sugView1 = v.findViewById(R.id.sug1)
        sugView2 = v.findViewById(R.id.sug2)
        sugView3 = v.findViewById(R.id.sug3)
        listOf(sugView1, sugView2, sugView3).forEach { sv ->
            sv?.setOnClickListener {
                val word = (it as? TextView)?.text?.toString() ?: return@setOnClickListener
                if (word.isNotEmpty()) {
                    it.animate().alpha(0.4f).setDuration(60).withEndAction {
                        it.animate().alpha(1f).setDuration(60).start()
                    }.start()
                    commitSuggestion(word)
                }
            }
        }

        val letters = "qwertyuiopasdfghjklzxcvbnm"
        val ids = listOf(
            R.id.kq,R.id.kw,R.id.ke,R.id.kr,R.id.kt,R.id.ky,R.id.ku,R.id.ki,R.id.ko,R.id.kp,
            R.id.ka,R.id.ks,R.id.kd,R.id.kf,R.id.kg,R.id.kh,R.id.kj,R.id.kk,R.id.kl,
            R.id.kz,R.id.kx,R.id.kc,R.id.kv,R.id.kb,R.id.kn,R.id.km
        )
        ids.forEachIndexed { i, id ->
            setupKey(v.findViewById<TextView>(id), R.drawable.key_bg) { typeChar(letters[i]) }
        }

        val numIds = listOf(R.id.k1,R.id.k2,R.id.k3,R.id.k4,R.id.k5,
                            R.id.k6,R.id.k7,R.id.k8,R.id.k9,R.id.k0)
        "1234567890".forEachIndexed { i, c ->
            val kc = KeyEvent.KEYCODE_0 + (c - '0')
            setupKey(v.findViewById<TextView>(numIds[i]), R.drawable.key_bg) {
                sendKey(kc); clearSugs()
            }
        }

        val shiftKey = v.findViewById<TextView>(R.id.btn_shift)
        shiftKey.setTag(R.id.original_bg_tag, R.drawable.key_bg_dark)
        shiftKey.setOnTouchListener { _, event ->
            when (event.actionMasked) {
                MotionEvent.ACTION_DOWN -> {
                    pressKey(shiftKey); toggleShiftState(); true
                }
                MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> {
                    releaseKey(shiftKey); updateShiftKeyAppearance(shiftKey); true
                }
                else -> true
            }
        }

        val backspace = v.findViewById<TextView>(R.id.btn_backspace)
        backspace.setTag(R.id.original_bg_tag, R.drawable.key_bg_dark)
        backspace.setOnTouchListener { _, event ->
            when (event.actionMasked) {
                MotionEvent.ACTION_DOWN -> {
                    pressKey(backspace)
                    sendKey(KeyEvent.KEYCODE_DEL)
                    bsRunnable = object : Runnable {
                        override fun run() {
                            sendKey(KeyEvent.KEYCODE_DEL)
                            bsHandler.postDelayed(this, 50)
                        }
                    }
                    bsHandler.postDelayed(bsRunnable!!, 300)
                    true
                }
                MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> {
                    releaseKey(backspace)
                    stopBackspaceRepeat()
                    bsHandler.postDelayed({ updateSuggestions() }, 80)
                    true
                }
                else -> true
            }
        }

        setupKey(v.findViewById<TextView>(R.id.btn_space),  R.drawable.key_bg_dark) {
            sendKey(KeyEvent.KEYCODE_SPACE); clearSugs()
        }
        setupKey(v.findViewById<TextView>(R.id.btn_comma),  R.drawable.key_bg) {
            sendKey(KeyEvent.KEYCODE_COMMA); clearSugs()
        }
        setupKey(v.findViewById<TextView>(R.id.btn_period), R.drawable.key_bg) {
            sendKey(KeyEvent.KEYCODE_PERIOD); clearSugs()
        }
        setupKey(v.findViewById<TextView>(R.id.btn_enter),  R.drawable.key_bg_action) {
            sendKey(KeyEvent.KEYCODE_ENTER); clearSugs()
        }

        setupKey(v.findViewById<TextView>(R.id.btn_symbols), R.drawable.key_bg_dark) {
            showBottomSheet(createSymbolsContent())
        }
        setupKey(v.findViewById<TextView>(R.id.btn_emoji), R.drawable.key_bg_dark) {
            showBottomSheet(createEmojiContent())
        }
        setupKey(v.findViewById<TextView>(R.id.btn_clipboard), R.drawable.key_bg_dark) {
            val clip = (getSystemService(Context.CLIPBOARD_SERVICE) as? ClipboardManager)
                ?.primaryClip?.getItemAt(0)?.text?.toString()
            if (!clip.isNullOrEmpty()) addToClipboard(clip)
            showBottomSheet(createClipboardContent())
        }

        val toolsBtn = v.findViewById<TextView>(R.id.btn_tools)
        setupKey(toolsBtn, R.drawable.key_bg_dark) { showToolsPopup(toolsBtn) }

        val keyA = v.findViewById<TextView>(R.id.ka)
        val keyL = v.findViewById<TextView>(R.id.kl)
        v.findViewById<View>(R.id.asdf_spacer_left)?.setOnTouchListener { _, event ->
            when (event.actionMasked) {
                MotionEvent.ACTION_DOWN -> { keyA?.let { pressKey(it) }; typeChar('a'); true }
                MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { keyA?.let { releaseKey(it) }; true }
                else -> true
            }
        }
        v.findViewById<View>(R.id.asdf_spacer_right)?.setOnTouchListener { _, event ->
            when (event.actionMasked) {
                MotionEvent.ACTION_DOWN -> { keyL?.let { pressKey(it) }; typeChar('l'); true }
                MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> { keyL?.let { releaseKey(it) }; true }
                else -> true
            }
        }

        return v
    }

    private fun showToolsPopup(anchor: View) {
        toolsPopup?.dismiss()
        val popup = LinearLayout(this).apply {
            orientation = LinearLayout.VERTICAL
            setBackgroundColor(0xFF2C2C2C.toInt())
            setPadding(8.dp, 8.dp, 8.dp, 8.dp)
        }
        listOf("Select All", "Copy", "Paste").forEach { label ->
            popup.addView(TextView(this).apply {
                text = label
                textSize = 22f
                setTextColor(0xFFFFFFFF.toInt())
                setPadding(16.dp, 10.dp, 16.dp, 10.dp)
                setOnClickListener {
                    toolsPopup?.dismiss()
                    when (label) {
                        "Select All" -> currentInputConnection
                            ?.performContextMenuAction(android.R.id.selectAll)
                        "Copy"       -> currentInputConnection
                            ?.performContextMenuAction(android.R.id.copy)
                        "Paste"      -> {
                            val clip = (getSystemService(Context.CLIPBOARD_SERVICE)
                                    as ClipboardManager)
                                .primaryClip?.getItemAt(0)
                                ?.coerceToText(this@Keyboard)?.toString()
                            if (!clip.isNullOrEmpty()) {
                                commitText(clip)
                                addToClipboard(clip)
                            }
                        }
                    }
                }
            })
        }
        toolsPopup = PopupWindow(
            popup,
            ViewGroup.LayoutParams.WRAP_CONTENT,
            ViewGroup.LayoutParams.WRAP_CONTENT,
            true
        ).apply {
            setBackgroundDrawable(ColorDrawable(Color.TRANSPARENT))
            isOutsideTouchable = true
            elevation = 8f
            showAsDropDown(anchor, 0, -(anchor.height * 4))
        }
    }

    private fun typeChar(c: Char) {
        val kc = KeyEvent.KEYCODE_A + (c.lowercaseChar() - 'a')
        val meta = if (shiftState != ShiftState.OFF) KeyEvent.META_SHIFT_ON else 0
        sendKey(kc, meta)
        if (shiftState == ShiftState.ONCE) {
            shiftState = ShiftState.OFF
            updateShiftKeyAppearance(qwertyView.findViewById(R.id.btn_shift))
            updateLetterKeys(qwertyView)
        }
        bsHandler.postDelayed({ updateSuggestions() }, 80)
    }

    private fun commitText(s: String) { currentInputConnection?.commitText(s, 1) }

    private fun stopBackspaceRepeat() {
        bsRunnable?.let { bsHandler.removeCallbacks(it) }
        bsRunnable = null
    }

    private fun toggleShiftState() {
        val now = System.currentTimeMillis()
        shiftState = when {
            shiftState == ShiftState.LOCKED -> ShiftState.OFF
            now - lastShiftTap < 200        -> ShiftState.LOCKED
            shiftState == ShiftState.OFF    -> ShiftState.ONCE
            else                            -> ShiftState.OFF
        }
        lastShiftTap = now
        updateLetterKeys(qwertyView)
    }

    private fun updateShiftKeyAppearance(shiftView: TextView) {
        shiftView.text = when (shiftState) {
            ShiftState.LOCKED -> "CAPS"
            ShiftState.ONCE   -> "SHFT"
            ShiftState.OFF    -> "Shft"
        }
        shiftView.setTextColor(
            if (shiftState == ShiftState.OFF) 0xFFFFFFFF.toInt()
            else 0xFF4FC3F7.toInt()
        )
    }

    private fun updateLetterKeys(v: View) {
        val upper = shiftState != ShiftState.OFF
        val letters = "qwertyuiopasdfghjklzxcvbnm"
        listOf(
            R.id.kq,R.id.kw,R.id.ke,R.id.kr,R.id.kt,R.id.ky,R.id.ku,R.id.ki,R.id.ko,R.id.kp,
            R.id.ka,R.id.ks,R.id.kd,R.id.kf,R.id.kg,R.id.kh,R.id.kj,R.id.kk,R.id.kl,
            R.id.kz,R.id.kx,R.id.kc,R.id.kv,R.id.kb,R.id.kn,R.id.km
        ).forEachIndexed { i, id ->
            v.findViewById<TextView>(id)?.text =
                if (upper) letters[i].uppercaseChar().toString()
                else letters[i].toString()
        }
    }

    // ── Suggestion logic ───────────────────────────────────────────

    private fun extractCurrentWord(before: String): String {
        val s = before.trimEnd(' ')
        val idx = s.indexOfLast { !it.isLetter() }
        return if (idx < 0) s.lowercase() else s.substring(idx + 1).lowercase()
    }

    private fun extractCurrentWordRaw(before: String): String {
        val s = before.trimEnd(' ')
        val idx = s.indexOfLast { !it.isLetter() }
        return if (idx < 0) s else s.substring(idx + 1)
    }

    private fun updateSuggestions() {
        val ic = currentInputConnection ?: run { clearSugs(); return }
        val before = ic.getTextBeforeCursor(50, 0)?.toString() ?: run { clearSugs(); return }
        val word = extractCurrentWord(before)
        if (word.length < 2) { clearSugs(); return }
        val matches = WORDS.filter { it.startsWith(word) && it != word }.take(3)
        sugView1?.text = matches.getOrNull(0) ?: ""
        sugView2?.text = matches.getOrNull(1) ?: ""
        sugView3?.text = matches.getOrNull(2) ?: ""
    }

    private fun clearSugs() {
        sugView1?.text = ""; sugView2?.text = ""; sugView3?.text = ""
    }

    private fun commitSuggestion(word: String) {
        if (word.isEmpty()) return
        val ic = currentInputConnection ?: return
        val before = ic.getTextBeforeCursor(50, 0)?.toString() ?: return
        val raw = extractCurrentWordRaw(before)
        val result = if (raw.isNotEmpty() && raw[0].isUpperCase())
            word.replaceFirstChar { it.uppercase() } else word
        ic.deleteSurroundingText(raw.length, 0)
        ic.commitText("$result ", 1)
        clearSugs()
        if (shiftState == ShiftState.ONCE) {
            shiftState = ShiftState.OFF
            qwertyView.post {
                updateShiftKeyAppearance(qwertyView.findViewById(R.id.btn_shift))
                updateLetterKeys(qwertyView)
            }
        }
    }

    // ── Clipboard adapter ──────────────────────────────────────────
    class ClipboardAdapter(
        private val items: MutableList<String>,
        private val onPaste: (String) -> Unit,
        private val onDelete: (Int) -> Unit
    ) : RecyclerView.Adapter<ClipboardAdapter.VH>() {

        inner class VH(val root: LinearLayout, val tv: TextView, val del: TextView)
            : RecyclerView.ViewHolder(root)

        override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): VH {
            val ctx = parent.context
            val root = LinearLayout(ctx).apply {
                orientation = LinearLayout.HORIZONTAL
                setPadding(20, 16, 20, 16)
                layoutParams = RecyclerView.LayoutParams(
                    ViewGroup.LayoutParams.MATCH_PARENT,
                    ViewGroup.LayoutParams.WRAP_CONTENT
                )
            }
            val tv = TextView(ctx).apply {
                layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f)
                setTextColor(0xFFFFFFFF.toInt())
                textSize = 20f
                maxLines = 2
                ellipsize = android.text.TextUtils.TruncateAt.END
            }
            val del = TextView(ctx).apply {
                text = "X"
                setTextColor(0xFF888888.toInt())
                textSize = 22f
                setPadding(26, 0, 6, 0)
            }
            root.addView(tv)
            root.addView(del)
            return VH(root, tv, del)
        }

        override fun onBindViewHolder(h: VH, pos: Int) {
            h.tv.text = items[pos]
            h.root.setOnClickListener { onPaste(items[pos]) }
            h.del.setOnClickListener  { onDelete(h.adapterPosition) }
        }

        override fun getItemCount() = items.size
    }

    private fun addToClipboard(text: String) {
        clipboardItems.remove(text)
        clipboardItems.add(0, text)
        if (clipboardItems.size > MAX_CLIP) clipboardItems.removeAt(clipboardItems.size - 1)
        saveClipboard()
        clipAdapter?.notifyDataSetChanged()
    }

    private fun saveClipboard() {
        getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).edit()
            .putString(PREFS_CLIP, clipboardItems.take(MAX_CLIP).joinToString("\u001F"))
            .apply()
    }

    private fun loadClipboard() {
        val s = getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE)
            .getString(PREFS_CLIP, "") ?: ""
        clipboardItems.clear()
        if (s.isNotEmpty()) clipboardItems.addAll(s.split("\u001F"))
    }

    private val Int.dp get() = (this * resources.displayMetrics.density).toInt()

    override fun onDestroy() {
        super.onDestroy()
        stopBackspaceRepeat()
        toolsPopup?.dismiss()
        dismissBottomSheet()
    }
}
