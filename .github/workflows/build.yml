      - name: Generate Gradle Scripts
        run: |
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "GreyB Launcher"
          include(":app")
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.9.1" apply false
              id("org.jetbrains.kotlin.android") version "2.2.0" apply false
          }
          EOF

          cat > app/build.gradle.kts << 'APP'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace  = "${{ env.PACKAGE_NAME }}"
              compileSdk = 36

              defaultConfig {
                  applicationId = "${{ env.PACKAGE_NAME }}"
                  minSdk        = 26
                  targetSdk     = 36
                  versionCode   = ${BUILD_NUMBER}
                  versionName   = "${BUILD_NUMBER}"
              }

              signingConfigs {
                  create("release") {
                      storeFile     = file("release.keystore")
                      storePassword = "greyb2024"
                      keyAlias      = "greyb"
                      keyPassword   = "greyb2024"
                  }              }

              buildTypes {
                  release {
                      isMinifyEnabled   = true
                      isShrinkResources = true
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"))
                      signingConfig = signingConfigs.getByName("release")
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("com.google.android.material:material:1.12.0")
              implementation("androidx.constraintlayout:constraintlayout:2.2.0")
              implementation("androidx.recyclerview:recyclerview:1.3.2")
          }
          APP

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC
          kotlin.code.style=official
          android.suppressUnsupportedCompileSdk=36
          EOF

      - name: Generate fixed keystore
        run: |
          keytool -genkey -v \
            -keystore app/release.keystore \
            -alias greyb \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass greyb2024 \
            -keypass greyb2024 \
            -dname "CN=GreyB, OU=GreyB, O=GreyB Launcher, L=Test, S=Test, C=US"

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin          chmod +x gradlew

      - name: Clean build
        run: |
          rm -rf app/build
          ./gradlew clean --no-daemon

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK signing
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
              echo "✅ Release APK generated"
              echo "📦 APK size: $(ls -lh "$APK_PATH" | awk '{print $5}')"
              BT_PATH=$(ls -d $ANDROID_HOME/build-tools/* 2>/dev/null | head -1)
              if [ -n "$BT_PATH" ]; then
                  $BT_PATH/apksigner verify --print-certs "$APK_PATH" 2>/dev/null || echo "⚠️ apksigner verify skipped"
              fi
          else
              echo "❌ Release APK not found"
              exit 1
          fi

      - name: Bundle APK + source
        run: |
          mkdir -p GreyB-Launcher-release
          cp app/build/outputs/apk/release/app-release.apk GreyB-Launcher-release/GreyBLauncher.apk

          APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')

          cat > GreyB-Launcher-release/BUILD_INFO.txt << EOF
          Build:      #${{ github.run_number }}
          Commit:     ${{ github.sha }}
          Timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Signed:     Yes (fixed key)
          APK Size:   $APK_SIZE
          Optimized:  Yes (ProGuard/R8 enabled)
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreyB-Launcher-${{ github.run_number }}
          path: GreyB-Launcher-release/
          retention-days: 30
