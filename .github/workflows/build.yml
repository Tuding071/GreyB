package com.greyb.launcher

import android.view.LayoutInflater
import android.view.View
import android.view.ViewGroup
import android.widget.TextView
import androidx.recyclerview.widget.RecyclerView

class EmojiAdapter(private val emojiData: Map<String, List<String>>) :
    RecyclerView.Adapter<EmojiAdapter.EmojiViewHolder>() {

    private val allEmojis = emojiData.values.flatten()

    class EmojiViewHolder(itemView: View) : RecyclerView.ViewHolder(itemView) {
        val emojiText: TextView = itemView.findViewById(R.id.emojiItem)
    }

    override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): EmojiViewHolder {
        val view = LayoutInflater.from(parent.context)
            .inflate(R.layout.item_emoji, parent, false)
        return EmojiViewHolder(view)
    }

    override fun onBindViewHolder(holder: EmojiViewHolder, position: Int) {
        holder.emojiText.text = allEmojis[position]
    }

    override fun getItemCount(): Int = allEmojis.size
}
