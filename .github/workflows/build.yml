name: Build GreyB Keyboard

on:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate project structure
        run: |
          mkdir -p app/src/main/java/com/greyb/keyboard
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      # ---------- Manifest (adds launcher activity) ----------
      - name: Generate AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="GreyB Keyboard"
                  android:icon="@mipmap/ic_launcher"
                  android:supportsRtl="true">

                  <!-- Launcher activity -->
                  <activity
                      android:name=".MainActivity"
                      android:label="GreyB Keyboard"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <!-- Keyboard service -->
                  <service
                      android:name=".Keyboard"
                      android:label="GreyB Keyboard"
                      android:permission="android.permission.BIND_INPUT_METHOD"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.view.InputMethod" />
                      </intent-filter>
                      <meta-data
                          android:name="android.view.im"
                          android:resource="@xml/method" />
                  </service>
              </application>
          </manifest>
          ENDOFFILE

      # ---------- Keyboard service resources ----------
      - name: Generate method.xml
        run: |
          cat > app/src/main/res/xml/method.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <input-method xmlns:android="http://schemas.android.com/apk/res/android">
              <subtype
                  android:label="English"
                  android:imeSubtypeLocale="en_US"
                  android:imeSubtypeMode="keyboard" />
          </input-method>
          ENDOFFILE

      - name: Generate drawables (3dp horizontal inset, 5dp vertical inset)
        run: |
          # key_bg.xml (normal keys)
          cat > app/src/main/res/drawable/key_bg.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape>
                      <solid android:color="@android:color/transparent" />
                  </shape>
              </item>
              <item
                  android:left="3dp"
                  android:right="3dp"
                  android:top="5dp"
                  android:bottom="5dp">
                  <shape>
                      <solid android:color="#333333"/>
                      <corners android:radius="8dp"/>
                  </shape>
              </item>
          </layer-list>
          ENDOFFILE

          # key_bg_dark.xml (shift, backspace, suggestion bar, space bar)
          cat > app/src/main/res/drawable/key_bg_dark.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape>
                      <solid android:color="@android:color/transparent" />
                  </shape>
              </item>
              <item
                  android:left="3dp"
                  android:right="3dp"
                  android:top="5dp"
                  android:bottom="5dp">
                  <shape>
                      <solid android:color="#2c2c2c"/>
                      <corners android:radius="8dp"/>
                  </shape>
              </item>
          </layer-list>
          ENDOFFILE

          # key_bg_action.xml (enter key)
          cat > app/src/main/res/drawable/key_bg_action.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape>
                      <solid android:color="@android:color/transparent" />
                  </shape>
              </item>
              <item
                  android:left="3dp"
                  android:right="3dp"
                  android:top="5dp"
                  android:bottom="5dp">
                  <shape>
                      <solid android:color="#1565C0"/>
                      <corners android:radius="8dp"/>
                  </shape>
              </item>
          </layer-list>
          ENDOFFILE

          # key_bg_accent.xml (clipboard active)
          cat > app/src/main/res/drawable/key_bg_accent.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape>
                      <solid android:color="@android:color/transparent" />
                  </shape>
              </item>
              <item
                  android:left="3dp"
                  android:right="3dp"
                  android:top="5dp"
                  android:bottom="5dp">
                  <shape>
                      <solid android:color="#1565C0"/>
                      <corners android:radius="8dp"/>
                  </shape>
              </item>
          </layer-list>
          ENDOFFILE

      - name: Generate values
        run: |
          cat > app/src/main/res/values/colors.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1e1e1e</color>
              <color name="colorSurface">#2c2c2c</color>
              <color name="colorAccent">#1565C0</color>
              <color name="textColorNormal">#FFFFFF</color>
              <color name="textColorSecondary">#AAAAAA</color>
          </resources>
          ENDOFFILE

          cat > app/src/main/res/values/styles.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.NoActionBar">
                  <item name="android:windowBackground">@color/colorPrimary</item>
                  <item name="android:navigationBarColor">@color/colorPrimary</item>
              </style>
          </resources>
          ENDOFFILE

      # ---------- Keyboard layout (A and L back to weight 1, thinner side padding) ----------
      - name: Generate qwerty.xml
        run: |
          cat > app/src/main/res/layout/qwerty.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/qwerty_root"
              android:layout_width="match_parent"
              android:layout_height="330dp"
              android:orientation="vertical"
              android:background="#1e1e1e">

              <!-- Suggestion row -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:paddingStart="3dp"
                  android:paddingEnd="3dp">

                  <TextView
                      android:id="@+id/btn_clipboard"
                      android:layout_width="42dp"
                      android:layout_height="match_parent"
                      android:gravity="center"
                      android:text="⧉"
                      android:textColor="#ffffff"
                      android:textSize="36sp"
                      android:background="@drawable/key_bg_dark"
                      android:paddingStart="0dp"
                      android:paddingEnd="0dp" />

                  <LinearLayout
                      android:layout_width="0dp"
                      android:layout_height="match_parent"
                      android:layout_weight="1"
                      android:orientation="horizontal"
                      android:layout_marginStart="0dp"
                      android:layout_marginEnd="0dp"
                      android:gravity="center_vertical">

                      <TextView android:id="@+id/sug1"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:gravity="center"
                          android:background="@drawable/key_bg_dark"
                          android:textColor="#ffffff"
                          android:textSize="22sp"
                          android:paddingStart="3dp"
                          android:paddingEnd="3dp" />

                      <TextView android:id="@+id/sug2"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:gravity="center"
                          android:background="@drawable/key_bg_dark"
                          android:textColor="#ffffff"
                          android:textSize="22sp"
                          android:paddingStart="3dp"
                          android:paddingEnd="3dp" />

                      <TextView android:id="@+id/sug3"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:gravity="center"
                          android:background="@drawable/key_bg_dark"
                          android:textColor="#ffffff"
                          android:textSize="22sp"
                          android:paddingStart="3dp"
                          android:paddingEnd="3dp" />

                  </LinearLayout>

                  <TextView
                      android:id="@+id/btn_tools"
                      android:layout_width="42dp"
                      android:layout_height="match_parent"
                      android:gravity="center"
                      android:text="✎"
                      android:textColor="#ffffff"
                      android:textSize="36sp"
                      android:background="@drawable/key_bg_dark"
                      android:paddingStart="0dp"
                      android:paddingEnd="0dp" />

              </LinearLayout>

              <!-- Number row -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingStart="3dp"
                  android:paddingEnd="3dp">
                  <TextView android:id="@+id/k1" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="1" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/k2" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="2" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/k3" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="3" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/k4" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="4" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/k5" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="5" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/k6" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="6" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/k7" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="7" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/k8" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="8" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/k9" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="9" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/k0" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="0" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
              </LinearLayout>

              <!-- QWERTY row -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingStart="3dp"
                  android:paddingEnd="3dp">
                  <TextView android:id="@+id/kq" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="q" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kw" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="w" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/ke" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="e" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kr" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="r" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kt" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="t" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/ky" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="y" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/ku" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="u" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/ki" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="i" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/ko" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="o" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kp" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="p" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
              </LinearLayout>

              <!-- ASDF row (A and L back to normal weight 1) -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingStart="3dp"
                  android:paddingEnd="3dp">
                  <TextView android:id="@+id/ka" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="a" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/ks" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="s" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kd" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="d" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kf" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="f" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kg" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="g" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kh" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="h" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kj" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="j" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kk" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="k" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kl" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="l" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
              </LinearLayout>

              <!-- ZXCV row -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingStart="3dp"
                  android:paddingEnd="3dp">
                  <TextView android:id="@+id/btn_shift" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1.5" android:gravity="center" android:text="⇧" android:textColor="#fff" android:textSize="35sp" android:background="@drawable/key_bg_dark" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kz" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="z" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kx" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="x" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kc" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="c" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kv" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="v" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kb" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="b" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/kn" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="n" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/km" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="m" android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/btn_backspace" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1.5" android:gravity="center" android:text="⌫" android:textColor="#fff" android:textSize="35sp" android:background="@drawable/key_bg_dark" android:paddingStart="3dp" android:paddingEnd="3dp"/>
              </LinearLayout>

              <!-- Action row -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:orientation="horizontal"
                  android:paddingStart="3dp"
                  android:paddingEnd="3dp">
                  <TextView android:id="@+id/btn_symbols" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1.5" android:gravity="center" android:text="\?123" android:textColor="#fff" android:textSize="26sp" android:background="@drawable/key_bg_dark" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/btn_emoji" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="☺" android:textColor="#fff" android:textSize="35sp" android:background="@drawable/key_bg_dark" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/btn_comma" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="," android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/btn_space" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="4" android:gravity="center" android:text="" android:textColor="#888" android:textSize="26sp" android:background="@drawable/key_bg_dark" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/btn_period" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:gravity="center" android:text="." android:textColor="#fff" android:textSize="32sp" android:background="@drawable/key_bg" android:paddingStart="3dp" android:paddingEnd="3dp"/>
                  <TextView android:id="@+id/btn_enter" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1.5" android:gravity="center" android:text="↵" android:textColor="#fff" android:textSize="35sp" android:background="@drawable/key_bg_action" android:paddingStart="3dp" android:paddingEnd="3dp"/>
              </LinearLayout>

              <View
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:background="#1e1e1e"/>

          </LinearLayout>
          ENDOFFILE

      # ---------- MainActivity (launcher) ----------
      - name: Generate MainActivity.kt
        run: |
          cat > app/src/main/java/com/greyb/keyboard/MainActivity.kt << 'ENDOFFILE'
          package com.greyb.keyboard

          import android.app.Activity
          import android.os.Bundle
          import android.view.Gravity
          import android.widget.LinearLayout
          import android.widget.TextView

          class MainActivity : Activity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  val root = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setBackgroundColor(0xFF1e1e1e.toInt())
                      gravity = Gravity.CENTER
                  }

                  val title = TextView(this).apply {
                      text = "GreyB Keyboard"
                      textSize = 32f
                      setTextColor(0xFFFFFFFF.toInt())
                      setPadding(0, 0, 0, 24.dp)
                  }

                  val subtitle = TextView(this).apply {
                      text = "Enable the keyboard in\nSettings → System → Languages & Input"
                      textSize = 18f
                      setTextColor(0xFFAAAAAA.toInt())
                      gravity = Gravity.CENTER
                  }

                  root.addView(title)
                  root.addView(subtitle)
                  setContentView(root)
              }

              private val Int.dp: Int get() = (this * resources.displayMetrics.density).toInt()
          }
          ENDOFFILE

      # ---------- Keyboard.kt ----------
      - name: Generate Keyboard.kt
        run: |
          cat > app/src/main/java/com/greyb/keyboard/Keyboard.kt << 'ENDOFFILE'
          package com.greyb.keyboard

          import android.content.*
          import android.graphics.Color
          import android.graphics.drawable.ColorDrawable
          import android.os.*
          import android.view.*
          import android.view.inputmethod.*
          import android.widget.*
          import androidx.recyclerview.widget.*
          import android.inputmethodservice.InputMethodService

          class Keyboard : InputMethodService() {

              private lateinit var rootFrame: FrameLayout
              private lateinit var qwertyView: View
              private var toolsPopup: PopupWindow? = null
              private var bottomSheetContainer: FrameLayout? = null
              private var isBottomSheetVisible = false

              private val clipboardItems = mutableListOf<String>()
              private val PREFS_NAME = "greyb_kb"
              private val PREFS_CLIP = "clipboard"
              private val MAX_CLIP = 10
              private var clipAdapter: ClipboardAdapter? = null

              private val bsHandler = Handler(Looper.getMainLooper())
              private var bsRunnable: Runnable? = null

              // Touch handling: remembers the view that was initially pressed
              private var pressedView: View? = null
              private val viewActions = HashMap<View, () -> Unit>()

              override fun onCreate() {
                  super.onCreate()
                  loadClipboard()
              }

              override fun onCreateInputView(): View {
                  window?.window?.navigationBarColor = 0xFF1e1e1e.toInt()
                  rootFrame = FrameLayout(this).apply {
                      layoutParams = ViewGroup.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                      )
                  }
                  qwertyView = buildQwerty()
                  rootFrame.addView(qwertyView)
                  return rootFrame
              }

              // ── Bottom sheet helper ────────────────────────────────────────
              private fun showBottomSheet(contentView: View) {
                  if (isBottomSheetVisible) dismissBottomSheet()

                  bottomSheetContainer = FrameLayout(this).apply {
                      setBackgroundColor(0x80000000.toInt())  // semi‑transparent overlay
                      setOnClickListener { dismissBottomSheet() } // tap outside to dismiss
                  }

                  val bottomSheet = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setBackgroundColor(0xFF2C2C2C.toInt())
                      layoutParams = FrameLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                      ).apply { gravity = Gravity.BOTTOM }
                  }

                  // simple handle / title
                  val titleBar = TextView(this).apply {
                      text = ""
                      textSize = 16f
                      setTextColor(0xFFFFFFFF.toInt())
                      gravity = Gravity.CENTER
                      setPadding(0, 12.dp, 0, 12.dp)
                  }
                  bottomSheet.addView(titleBar)
                  bottomSheet.addView(contentView)

                  bottomSheetContainer?.addView(bottomSheet)
                  rootFrame.addView(bottomSheetContainer)

                  // slide‑up animation
                  bottomSheet.translationY = 500f
                  bottomSheet.animate().translationY(0f).setDuration(250).start()
                  isBottomSheetVisible = true
              }

              private fun dismissBottomSheet() {
                  if (!isBottomSheetVisible) return
                  val container = bottomSheetContainer
                  if (container != null) {
                      container.animate().alpha(0f).setDuration(200).withEndAction {
                          rootFrame.removeView(container)
                      }.start()
                  }
                  bottomSheetContainer = null
                  isBottomSheetVisible = false
              }

              // ── Bottom sheet content builders ──────────────────────────────
              private fun createSymbolsContent(): View {
                  val symbols = listOf(
                      "!","@","#","$","%","&","*","(",")","+",
                      "-","=","/",":",";","\"","'","?","~","_",
                      "[","]","{","}","<",">","|","\\","^"
                  )
                  val grid = GridLayout(this).apply {
                      columnCount = 10
                      useDefaultMargins = true
                      layoutParams = LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                      )
                  }
                  val cellSize = (resources.displayMetrics.widthPixels - 64.dp) / 10
                  symbols.forEach { sym ->
                      val tv = TextView(this).apply {
                          text = sym
                          textSize = 22f
                          gravity = Gravity.CENTER
                          setTextColor(0xFFFFFFFF.toInt())
                          layoutParams = GridLayout.LayoutParams().apply {
                              width = cellSize
                              height = cellSize
                          }
                      }
                      setupKey(tv) { typeText(sym); dismissBottomSheet() }
                      grid.addView(tv)
                  }
                  return grid
              }

              private fun createEmojiContent(): View {
                  val emojis = listOf("😀","😂","😍","🥰","😎","👍","🔥","🎉")  // only 8 emojis
                  val grid = GridLayout(this).apply {
                      columnCount = 4
                      useDefaultMargins = true
                      layoutParams = LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                      )
                  }
                  val cellSize = (resources.displayMetrics.widthPixels - 64.dp) / 4
                  emojis.forEach { emoji ->
                      val tv = TextView(this).apply {
                          text = emoji
                          textSize = 38f
                          gravity = Gravity.CENTER
                          layoutParams = GridLayout.LayoutParams().apply {
                              width = cellSize
                              height = cellSize
                          }
                      }
                      setupKey(tv) { typeText(emoji); dismissBottomSheet() }
                      grid.addView(tv)
                  }
                  return grid
              }
