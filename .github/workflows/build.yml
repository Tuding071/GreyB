name: Build GreyB Keyboard (Phase 1)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Create project
        shell: bash
        run: |
          set -e

          PKG="app/src/main/java/rkr/tinykeyboard/inputmethod"

          mkdir -p "$PKG"
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

# ---------------- JAVA ----------------
          cat <<'EOF' > $PKG/SoftKeyboard.java
package rkr.tinykeyboard.inputmethod;

import android.inputmethodservice.InputMethodService;
import android.inputmethodservice.Keyboard;
import android.inputmethodservice.KeyboardView;
import android.view.View;
import android.view.inputmethod.InputConnection;

public class SoftKeyboard extends InputMethodService
        implements KeyboardView.OnKeyboardActionListener {

    private KeyboardView kv;
    private Keyboard keyboard;

    private static final int KEY_CLIPBOARD = -110;
    private static final int KEY_EMOJI = -111;

    @Override
    public View onCreateInputView() {
        kv = (KeyboardView) getLayoutInflater().inflate(R.layout.input, null);
        keyboard = new Keyboard(this, R.xml.qwerty);
        kv.setKeyboard(keyboard);
        kv.setOnKeyboardActionListener(this);
        kv.setPreviewEnabled(false);
        return kv;
    }

    @Override
    public void onKey(int primaryCode, int[] keyCodes) {
        InputConnection ic = getCurrentInputConnection();
        if (ic == null) return;

        switch (primaryCode) {
            case Keyboard.KEYCODE_DELETE:
                ic.deleteSurroundingText(1, 0);
                break;

            case Keyboard.KEYCODE_DONE:
                ic.commitText("\n", 1);
                break;

            case KEY_CLIPBOARD:
                break;

            case KEY_EMOJI:
                break;

            default:
                ic.commitText(String.valueOf((char) primaryCode), 1);
        }
    }

    @Override public void onPress(int i) {}
    @Override public void onRelease(int i) {}
    @Override public void onText(CharSequence text) {}
    @Override public void swipeLeft() {}
    @Override public void swipeRight() {}
    @Override public void swipeDown() {}
    @Override public void swipeUp() {}
}
EOF

